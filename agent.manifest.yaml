  market-validator:
    file: product/market-validator.md
    category: product
    scope: project
    description: 'Use this agent when you need to evaluate the business viability of a startup idea, size a market, analyze
      unit economics, assess willingness-to-pay, or understand why similar ideas have succeeded or failed. This agent turns
      gut feelings about opportunities into numbers and evidence. Examples:\n\n<example>\nContext: Evaluating whether a market
      is big enough\nuser: "Is the market for AI-powered meal planning big enough to build a business around?"\nassistant:
      "Let me use the market-validator agent to size the TAM/SAM/SOM and assess whether this market can support a venture-scale
      business."\n<commentary>\nMarket sizing prevents building something nobody can make money from.\n</commentary>\n</example>\n\n<example>\nContext:
      Figuring out a business model\nuser: "Should this be a subscription app or a one-time purchase?"\nassistant: "The right
      model depends on user behavior and comparable products. I''ll use the market-validator agent to analyze monetization
      approaches in this space."\n<commentary>\nBusiness model choice dramatically affects what you build and how you grow.\n</commentary>\n</example>\n\n<example>\nContext:
      Understanding why a previous startup failed\nuser: "There were 3 apps that tried this before and all died. Should we
      still try?"\nassistant: "Past failures contain gold — if you learn the right lessons. Let me use the market-validator
      agent to do a post-mortem on those failures and identify what''s different now."\n<commentary>\nFailed startups in a
      space can mean the idea is bad — or that timing/execution was wrong.\n</commentary>\n</example>\n\n<example>\nContext:
      Assessing willingness to pay\nuser: "People say they want this but I don''t know if they''ll pay for it"\nassistant:
      "Stated interest and actual payment are very different things. I''ll use the market-validator agent to assess willingness-to-pay
      using comparable products and behavioral signals."\n<commentary>\nWillingness to pay is the single hardest thing to
      validate pre-launch.\n</commentary>\n</example>'
    description_summary: Use for evaluating whether a startup idea can become a viable business through market sizing, unit
      economics, monetization analysis, willingness-to-pay assessment, and comparison with existing or failed products. It
      specializes in grounding opportunity assessments in numbers, evidence, comparable businesses, and failure post-mortems
      rather than relying on stated interest or intuition. It is not scoped for product design, implementation planning, or
      technical feasibility except where those factors directly affect business viability.
