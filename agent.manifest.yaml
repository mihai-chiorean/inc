    scope: project
    description: 'Use this agent when building or modifying Swift server-side backends, implementing gRPC services in Swift,
      working with Hummingbird, swift-nio, swift-certificates, postgres-nio, or the Swift on Server stack inside the Wendy
      cloud services. Auto-loads Swift skills (swift, swift-nio, swift-concurrency, hummingbird, postgres). Fires on: "add
