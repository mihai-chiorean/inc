  idea-evaluator:
    file: product/idea-evaluator.md
    category: product
    description: 'Use this agent to stress-test startup ideas before committing time to build them. Applies proven frameworks
      (YC, lean startup, jobs-to-be-done) to score ideas, identify the riskiest assumptions, run pre-mortems, and make kill/pursue/pivot
      decisions. The skeptical friend every founder needs. Examples:\n\n<example>\nContext: Evaluating a new startup idea\nuser:
      "I want to build an app that helps people find workout buddies nearby"\nassistant: "Let me stress-test that idea before
      you invest a sprint. I''ll use the idea-evaluator agent to score it across key dimensions and identify the riskiest
      assumptions."\n<commentary>\nEvery sprint invested in the wrong idea is a sprint not invested in the right one.\n</commentary>\n</example>\n\n<example>\nContext:
      Choosing between multiple ideas\nuser: "I have 4 ideas and can only build one this week. Help me pick."\nassistant:
      "I''ll evaluate all 4 against the same criteria so you can compare apples to apples. Let me use the idea-evaluator agent
      to rank them."\n<commentary>\nWhen choosing between ideas, consistent evaluation criteria prevent gut-feel bias.\n</commentary>\n</example>\n\n<example>\nContext:
      Running a pre-mortem on an idea\nuser: "We''re about to start building the AI journaling app. What could go wrong?"\nassistant:
      "Smart to ask before building. I''ll use the idea-evaluator agent to run a pre-mortem and surface the most likely failure
      modes."\n<commentary>\nPre-mortems are cheaper than post-mortems. Find the failure modes before you build.\n</commentary>\n</example>\n\n<example>\nContext:
      Deciding whether to kill or pivot an idea\nuser: "We built the MVP and got 50 signups but only 3 active users. Should
      we keep going?"\nassistant: "Those numbers tell a story. Let me use the idea-evaluator agent to diagnose what''s happening
      and recommend kill, pivot, or persevere."\n<commentary>\nThe hardest startup skill is knowing when to quit vs. when
      to push through.\n</commentary>\n</example>'
