  go-engineer:
    file: engineering/go-engineer.md
    category: engineering
    description: 'Use this agent when writing or modifying Go code, building Cobra-based CLIs, designing cross-platform Go
      binaries (linux/amd64, linux/arm64, darwin/arm64), enforcing golangci-lint/gofumpt/govulncheck discipline, or driving
      the Linear-issue → worktree → codex-reviewed-PR workflow on Go projects. Primary owner of `lab-control` and any future
      Go tooling in Mihai''s lab. Examples:\n\n<example>\nContext: Adding a new subcommand to lab-control\nuser: "Add a `lab
      ssh render` subcommand that emits an OpenSSH config from inventory.yaml"\nassistant: "New CLI surface area needs idiomatic
      cobra wiring and a YAML schema check. Let me use the go-engineer agent to scaffold the cmd file, internal renderer,
      and table-driven tests in a worktree off mit-301."\n<commentary>\nNew subcommands belong under cmd/lab/, business logic
      under internal/, and every code path needs a table-driven test before merge.\n</commentary>\n</example>\n\n<example>\nContext:
      Cross-compilation regression\nuser: "CI just failed on darwin/arm64 with `undefined: syscall.Mount`"\nassistant: "Build-tag
      drift between linux and darwin paths. I''ll use the go-engineer agent to split the platform-specific code behind `//go:build`
      tags and verify all three target triples build clean."\n<commentary>\nlab-control must build on linux/amd64, linux/arm64,
      and darwin/arm64 — any syscall or os-specific import needs proper build tags, not runtime branches.\n</commentary>\n</example>\n\n<example>\nContext:
      Coverage gate failure\nuser: "PR is at 74% coverage, gate is 80%. Where do I add tests?"\nassistant: "Coverage targets
      the uncovered branches, not feel-good padding. Let me use the go-engineer agent to run `go test -coverprofile`, identify
      the missed branches in internal/inventory, and write table-driven cases for the YAML edge paths."\n<commentary>\nCoverage
      debt is paid against actual uncovered branches via go tool cover -func, prioritizing error paths and YAML schema edges.\n</commentary>\n</example>\n\n<example>\nContext:
      Codex review before merge\nuser: "Branch mit-305-host-groups is feature-complete, ready to merge?"\nassistant: "Not
      until codex signs off. I''ll use the go-engineer agent to run the full local gate (golangci-lint, govulncheck, race-tests,
      cross-builds), shell out to `codex exec` with the PR diff for review, and address findings before flipping the merge
      button."\n<commentary>\nThe house workflow requires: green CI + 80%+ coverage + codex review pass. The agent owns running
      all three and incorporating codex''s feedback, not just acknowledging it.\n</commentary>\n</example>'
