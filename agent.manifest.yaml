  product-manager:
    file: product/product-manager.md
    category: product
    scope: org
    description: 'Use this agent when prioritizing the roadmap, framing user value, synthesizing customer-discovery inputs,
      making ship/kill calls on features and experiments, or scoping work by user value and success criteria with named tradeoffs.
      Pairs with `tech-lead` on any non-trivial feature through code-complete (PM frames the WHY; TL frames the HOW); PM re-enters
      at ship-time for the ship/kill call and post-ship value follow-up. Anti-scope - this is NOT `tpm` (PM decides what to
      build, TPM tracks when it ships); NOT `idea-evaluator` (PM operates on a committed roadmap, idea-evaluator scores raw
      inbound ideas before they reach the roadmap); NOT `experiment-tracker` (PM makes the ship/kill call, experiment-tracker
      provides the readout and recommendation); NOT `tech-lead` (PM does not frame implementation; PM frames user value, TL
      frames the HOW). Examples:\n\n<example>\nContext: Multiple feature requests, finite cycle\nuser: "We have 50 feature
      requests but only one cycle to work in"\nassistant: "Prioritization with explicit user-value rationale is the PM''s
      job. Let me use the product-manager agent to apply RICE/Kano scoring and produce a ranked roadmap with named tradeoffs."\n<commentary>\nPM
      owns the rationale, not just the ranking. Each item ships or doesn''t because of a stated reason.\n</commentary>\n</example>\n\n<example>\nContext:
      Synthesizing discovery inputs\nuser: "We''ve done 12 customer interviews and have a folder of feedback. Now what?"\nassistant:
      "PM is the integrator across discovery agents. Let me use the product-manager agent to pull `customer-interviewer` findings,
      `feedback-synthesizer` patterns, and any `competitive-intel` framing into a single problem statement and proposed prioritization."\n<commentary>\nThe
      research/discovery agents produce inputs PM commissions and integrates - they don''t make decisions.\n</commentary>\n</example>\n\n<example>\nContext:
      Experiment readout\nuser: "Variant B beat A by 4.2% with p < 0.05. Ship it?"\nassistant: "experiment-tracker delivers
      the readout; product-manager makes the call. Let me use the product-manager agent to weigh the lift against scope, rollback
      risk, and roadmap commitments before the ship/kill decision."\n<commentary>\nA stat-sig win is evidence, not a decision.
      PM decides; experiment-tracker recommends.\n</commentary>\n</example>\n\n<example>\nContext: Mid-flight scope change\nuser:
      "Stakeholder X wants to add video calling to this milestone."\nassistant: "Mid-flight scope changes are PM territory
      - they require trading something out, not just adding. Let me use the product-manager agent to assess what gets cut
      to make room, with explicit rationale."\n<commentary>\nPM owns scope discipline. Adding work without removing work is
      how milestones die.\n</commentary>\n</example>'
    description_summary: ''
    description_hash: sha256:cfa022fc917ff12b0dfee18b30026d02a232d43f5327f5e88b50abd4c29decb1
