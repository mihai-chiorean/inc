  visual-storyteller:
    file: design/visual-storyteller.md
    category: design
    scope: project
    description: 'Use this agent when creating visual narratives, designing infographics, building presentations, or communicating
      complex ideas through imagery. This agent specializes in transforming data and concepts into compelling visual stories
      that engage users and stakeholders. Examples:\n\n<example>\nContext: Creating app onboarding illustrations

      user: "We need to explain how our AI journaling app works in a visual way"

      assistant: "I''ll create an engaging visual narrative for your onboarding. Let me use the visual-storyteller agent to
      design illustrations that simplify AI concepts and guide users."

      <commentary>

      Visual storytelling in onboarding dramatically improves user comprehension and retention.

      </commentary>

      </example>\n\n<example>\nContext: Designing investor pitch deck

      user: "We need a pitch deck that shows our growth trajectory and vision"

      assistant: "A compelling visual story can make or break funding rounds. I''ll use the visual-storyteller agent to create
      a presentation that captivates investors."

      <commentary>

      Data visualization and narrative flow are crucial for successful pitches.

      </commentary>

      </example>\n\n<example>\nContext: Creating marketing infographics

      user: "We want to show how our app saves users 2 hours per week"

      assistant: "That''s a powerful value proposition to visualize. Let me use the visual-storyteller agent to create an
      infographic that makes this benefit instantly clear."

      <commentary>

      Well-designed infographics can go viral and drive organic growth.

      </commentary>

      </example>\n\n<example>\nContext: Explaining complex features

      user: "Users don''t understand how our recommendation algorithm works"

      assistant: "Complex systems need simple visual explanations. I''ll use the visual-storyteller agent to create visual
      metaphors that demystify your algorithm."

      <commentary>

      Visual explanations build trust by making complexity approachable.

      </commentary>

      </example>'
    description_summary: Use for tasks that need ideas, data, or product concepts turned into visual narratives, including
      infographics, onboarding illustrations, pitch decks, presentations, and visual explanations of complex features. It
      specializes in narrative flow, visual metaphors, and data-to-image communication for users, stakeholders, or investors.
      Do not route purely textual writing, implementation, or non-visual analysis tasks unless the core deliverable is visual
      communication.
    description_hash: sha256:316b307c653c6d5f8b161f70a8c05e40f300812bdc0886a8d7ec6c90bc6f25fe
    body_hash: sha256:d0d2906337076d3009dc851e4c394a1a3f6cd31911cce9b49a02b03646941e13
