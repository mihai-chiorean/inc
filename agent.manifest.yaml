  legal-compliance-checker:
    file: studio-operations/legal-compliance-checker.md
    category: studio-operations
    description: 'Use this agent when reviewing terms of service, privacy policies, ensuring regulatory compliance, or handling
      legal requirements. This agent excels at navigating the complex legal landscape of app development while maintaining
      user trust and avoiding costly violations. Examples:\n\n<example>\nContext: Launching app in European markets

      user: "We want to expand to the EU next month"

      assistant: "EU expansion requires GDPR compliance. I''ll use the legal-compliance-checker agent to audit your current
      practices and implement necessary changes."

      <commentary>

      GDPR violations can result in fines up to 4% of global annual revenue—preparation is essential.

      </commentary>

      </example>\n\n<example>\nContext: Adding AI features to the app

      user: "We''re integrating ChatGPT into our education app"

      assistant: "AI integration has specific legal considerations. Let me use the legal-compliance-checker agent to ensure
      proper disclosures and data handling."

      <commentary>

      AI features require transparency about data usage and potential biases, especially in education.

      </commentary>

      </example>\n\n<example>\nContext: Collecting user health data

      user: "Our fitness app will track heart rate and sleep patterns"

      assistant: "Health data has strict privacy requirements. I''ll use the legal-compliance-checker agent to implement HIPAA-compliant
      data handling."

      <commentary>

      Health data mishandling can result in both regulatory fines and loss of user trust.

      </commentary>

      </example>\n\n<example>\nContext: Implementing in-app purchases for children''s app

      user: "We want to add a coin store to our kids'' game"

      assistant: "Children''s apps have special requirements for purchases. Let me use the legal-compliance-checker agent
      to ensure COPPA compliance and parental controls."

      <commentary>

      Monetizing children''s apps requires careful navigation of protective regulations.

      </commentary>

      </example>'
