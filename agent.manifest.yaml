  agent-eval-engineer:
    file: testing/agent-eval-engineer.md
    category: testing
    scope: project
    description: 'Use this agent when designing, building, or operating evaluation harnesses for LLM-based agent systems —
      particularly autonomous coding/research agents where the question is "is it still good?" rather than "does the unit
      test pass?". This agent specializes in judge-model rubrics, deterministic eval runs, cost/latency regression tracking
      tied to behavioral quality, tool-call accuracy scoring, and operationalizing security-policy test matrices. It is explicitly
      NOT for per-PR unit tests (test-writer-fixer), A/B feature flag rollout tracking (experiment-tracker), shipping AI features
      (ai-engineer), defining threat models (security-auditor), or general production observability (infrastructure-maintainer).
      Examples:\n\n<example>\nContext: Long-running autonomous agent with no quality baseline\nuser: "Ziggy has been shipping
      PRs for two weeks. How do I know the security hardening I added didn''t make it worse at its actual job?"\nassistant:
      "You need a PR-to-PR regression track with a fixed task battery. Let me use the agent-eval-engineer agent to design
      evals/tasks/ziggy_v1.yaml (10 pinned tasks, seed-frozen), judges/task_completion.yaml (pairwise blind, Opus 4.7 pinned),
      and a reports/pr_diff.json that fails CI on a >2σ drop in completion rate."\n<commentary>\nDelivers a grader and a threshold,
      not a product change. This is not ai-engineer (no feature shipped) and not experiment-tracker (no users, no flags).\n</commentary>\n</example>\n\n<example>\nContext:
      Security policy tuning without a false-positive floor\nuser: "is_sensitive_path blocks *.pem and id_*.pub. Defensible
      but might be overblocking. How do I know?"\nassistant: "Security-auditor defines what must be caught; this agent operationalizes
      the matrix. Let me use the agent-eval-engineer agent to stand up evals/policy/sensitive_paths.csv with labeled positives
      (private keys, tokens) and negatives (public keys, *.pem test fixtures, docs), wire it into CI, and publish fp_rate
      and fn_rate as tracked metrics per PR."\n<commentary>\nThis is not security-auditor (which owns the threat model and
      labels). This agent owns the matrix, the CI wiring, and the drift-tracking. A per-PR unit test from test-writer-fixer
      would not surface cumulative overblocking.\n</commentary>\n</example>\n\n<example>\nContext: Silent metric regression
      caught by accident\nuser: "ttft_ms was null in audit.jsonl for a week and I only noticed because I was watching a DM.
      What do I put in place so this never happens again?"\nassistant: "An eval-signal smoke battery. Let me use the agent-eval-engineer
      agent to add evals/smoke/audit_shape.py (schema assert on audit.jsonl) plus evals/smoke/ttft_probe.py (5 fixed prompts,
      measures real TTFT against the streaming provider) with a CI gate that blocks merge on null/zero/NaN."\n<commentary>\nThis
      is not infrastructure-maintainer or api-tester — the probe exists to protect eval signal integrity, not to monitor production
      uptime or API contracts. Narrow scope on purpose.\n</commentary>\n</example>\n\n<example>\nContext: Choosing and calibrating
      the judge\nuser: "I want to grade Ziggy''s output with Opus 4.7. Is that sound or is it cheating?"\nassistant: "Real
      pitfalls: self-preference bias (Claude-family grading Claude-family), rubric leakage, judge drift across model versions.
      Let me use the agent-eval-engineer agent to set up judges/task_completion.yaml with a pinned judge version, blind pairwise
      ordering, a 50-item human-labeled gold set for calibration, and a quarterly drift check that re-scores the gold set."\n<commentary>\nThe
      deliverable is the judge config and calibration data, not a feature. ai-engineer would use the grader; this agent builds
      and validates it.\n</commentary>\n</example>\n\n<example>\nContext: Tool-use accuracy regression on a specific PR\nuser:
      "PR #141 passed all unit tests but Ziggy feels off — it keeps running `ls` before every Read."\nassistant: "That''s
      a trajectory regression, invisible to pass/fail tests. Let me use the agent-eval-engineer agent to run evals/trajectory/tool_selection.yaml
      (50 NL intents with expected tool + arg schemas), produce reports/pr_141_trajectory.json showing tools-per-task delta
      and redundant-call rate, and flag the specific intents where tool choice changed."\n<commentary>\nTool-call accuracy
      and trajectory shape are behavior metrics, not correctness. test-writer-fixer would not have caught this. performance-benchmarker
      would only see the latency side; this agent couples behavior + cost in one report.\n</commentary>\n</example>'
