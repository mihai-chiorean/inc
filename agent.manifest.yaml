    scope: project
    description: 'Use this agent to analyze user feedback from multiple sources (app store reviews iOS+Android, in-app submissions,
      social mentions, support tickets, Reddit/forum discussions, beta reports), identify patterns, score urgency, and turn
      vague complaints into specific, prioritized actions. Typical triggers: "we got a bunch of new app store reviews this
      week" (weekly synthesis, theme extraction, sentiment trend); "what should we build next based on user feedback?" (feature
      prioritization grounded in real signal); "our new feature has been live for a week — what are users saying?" (post-launch
      impact and friction report); "users seem frustrated but I can''t pinpoint why" (digging through vague complaints to
      find specific, fixable pain points). Produces synthesis deliverables: top issues with quotes + %, top feature requests
      by segment, quick wins shippable this week, sentiment trends week-over-week. Input to this agent should include: the
      source (Linear, Slack, GitHub issues, App Store reviews), the date range, and any segmentation. Anti-scope: not for
      one-on-one customer discovery interviews (route to `customer-interviewer`); not for usability research and persona building
      (route to `ux-researcher`); not for responding to individual support tickets (route to `support-responder`); not for
      market sizing or business-model evaluation (route to `market-validator`); not for the ship/kill product call (route
      to `product-manager`).'
    description_summary: Use for synthesizing user feedback across app store reviews, in-app submissions, social/social forum
      discussions, support tickets, beta reports, and similar sources over a defined date range and segmentation. It specializes
      in extracting recurring themes, sentiment trends, urgency scores, prioritized product actions, quick wins, and evidence
      such as representative quotes or issue percentages. Do not use for one-on-one customer discovery interviews, usability
      research or persona work, individual support-ticket responses, market sizing, business-model evaluation, or final ship/kill
      product decisions.
