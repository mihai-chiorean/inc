  video-pipeline-engineer:
    file: engineering/video-pipeline-engineer.md
    category: engineering
    scope: project
    description: 'Use this agent for GStreamer pipelines, RTSP / RTP / RTCP / SDP, go2rtc / mediamtx relays, ffmpeg / libav,
      DeepStream elements (nvv4l2decoder, nvvideoconvert, nvstreammux, nvinfer, nvtracker), encoder/muxer chains (x264enc,
      h264parse, qtmux, splitmuxsink), HLS / LL-HLS / fMP4, device-side WebRTC (SDP/ICE/DTLS-SRTP), tee/queue topology, leaky-queue
      tuning, caps negotiation failures (`not-negotiated`), PTS/DTS propagation across NVMM↔system. Owns *plumbing* — frames
      camera→inference and inference→disk/relay — not the model, not the kernel. Fires on: "splitmuxsink logs Buffer has no
      PTS after x264enc behind a leaky queue" — pad-by-pad PTS verification to find where the timestamp first becomes invalid;
      "RTSP disconnects after 60s of low motion" — RTSP session lifecycle, do-rtsp-keep-alive vs firmware quirks, RTCP RR
      cadence, tshark evidence; "two rtspsrc on same camera, NVMM pool churn" — `rtspsrc → nvv4l2decoder → tee → N branches`
      redesign with bus-message source filtering; "nvstreammux batched-push-timeout under frame drops" — property-pair tuning
      (live-source, batched-push-timeout, attach-sys-ts, queue max-size-time); "go2rtc detector starts before relay has a
      source" — producer/consumer ordering (on-demand vs eager, startup retry). Anti-scope: model-side (NMS, NvDCF tuning)
      routes to `vision-engineer`; foundation-model + batch labeling routes to `video-analytics-engineer`; TensorRT / kernels
      route to `gpu-engineer`; missing plugins route to `embedded-linux`; container lifecycle routes to `embedded-device`.'
    description_summary: Use for video pipeline plumbing involving GStreamer, RTSP/RTP/RTCP/SDP, go2rtc or mediamtx relays,
      ffmpeg/libav, DeepStream element chains, encoder/muxer paths, HLS/LL-HLS/fMP4, device-side WebRTC, queue/tee topology,
      caps negotiation, and timestamp propagation. It specializes in moving frames from camera to inference and from inference
      to disk or relay, including diagnosing PTS/DTS loss, RTSP session dropouts, NVMM pool churn, mux timing under frame
      drops, and relay startup ordering. Do not use for model behavior or tracking/NMS tuning, foundation-model labeling workflows,
      TensorRT or kernel work, missing plugin/package issues, or container lifecycle problems.
