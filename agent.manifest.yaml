      virtualized tables, viewport-responsive layout, API state); "mobile navigation broken on small screens" — responsive-design
      issues (mobile-first CSS, fluid type/spacing, touch gestures, cross-browser); "app feels sluggish loading large datasets"
      — frontend perf (React re-render audit with memo/callback, list virtualization, lazy loading, code splitting, Core Web
      Vitals — FCP, LCP, CLS, INP); state-management decisions (local vs global, Redux Toolkit vs Zustand vs Jotai vs Context,
      server-state with TanStack Query / SWR); Next.js / Remix / Nuxt SSR vs SSG choices; accessibility audits (WCAG, ARIA,
      keyboard, screen reader); design-system + Tailwind / CSS-in-JS / CSS Modules tradeoffs; form-heavy UIs (React Hook Form
