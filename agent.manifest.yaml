  vision-engineer:
    file: engineering/vision-engineer.md
    category: engineering
    scope: project
    description: 'Use this agent when working on computer vision MODELS and frame-as-tensor problems — object detection models
      (YOLO, SSD, DETR), TensorRT engine building/optimization for vision, frame preprocessing (letterbox, normalization,
      color conversion), NMS and coordinate remapping, multi-object tracking algorithms (SORT, DeepSORT, NvDCF, ByteTrack),
      or accuracy debugging of edge-deployed vision models on NVIDIA Jetson. This agent owns the model and the frame-as-data
      pipeline (preprocess → inference → postprocess → track). For the *transport* of frames into and out of that pipeline
      (GStreamer element/property tuning, RTSP keepalive, go2rtc/mediamtx relay config, encoder/muxer chains, PTS/DTS propagation,
      caps negotiation failures), route to `video-pipeline-engineer`. Examples:


      <example>

      Context: Building or debugging a YOLO object detection pipeline

      user: "The YOLO detector is producing wrong bounding box coordinates after preprocessing"

      assistant: "Bounding box coordinate transforms between model space and image space are a common source of bugs. Let
      me use the vision-engineer agent to trace the full coordinate pipeline from letterbox resize through inference output
      to screen-space boxes."

      <commentary>

      Coordinate space bugs in detection pipelines require understanding letterboxing, aspect ratio preservation, and the
      exact output format of YOLO variants (transposed vs non-transposed, center-xy vs top-left, normalized vs pixel coordinates).

      </commentary>

      </example>


      <example>

      Context: Optimizing TensorRT inference performance on Jetson

      user: "Our YOLO11n model runs at 12 FPS on Orin but we need 30 FPS"

      assistant: "Let me use the vision-engineer agent to profile the pipeline and identify bottlenecks — it could be preprocessing,
      GPU memory transfers, engine configuration, or postprocessing overhead."

      <commentary>

      Vision pipeline optimization here means the model-side latency breakdown: preprocess (letterbox, normalization, color
      conversion), GPU transfer, inference, postprocess (NMS, decode, coordinate remap). Decode and render are upstream/downstream
      — if those are the bottleneck, route to video-pipeline-engineer.

      </commentary>

      </example>


      <example>

      Context: Implementing multi-object tracking

      user: "We need to track people across frames and assign stable IDs"

      assistant: "I''ll implement a tracking algorithm suited to your detector. Let me use the vision-engineer agent to build
      a SORT/DeepSORT-style tracker with Kalman filtering and IoU-based association."

      <commentary>

      Tracking requires understanding detection noise, occlusion handling, track lifecycle management, and the trade-offs
      between simple IoU trackers and visual-feature-based trackers like DeepSORT or NvDCF.

      </commentary>

      </example>


      <example>

      Context: Detection accuracy regression after model swap

      user: "We swapped YOLO11n for YOLOv8n and mAP dropped from 0.42 to 0.31 on our validation set"

      assistant: "Accuracy regressions after a model swap usually come from preprocessing mismatch (the two models were trained
      with different letterbox/normalization conventions) or output-tensor decoding (transposed vs non-transposed). Let me
      use the vision-engineer agent to compare the two models'' expected input/output shapes and validate the preprocessing
      chain against each."

      <commentary>

      The unit of analysis here is the frame as a tensor — preprocessing, inference, postprocessing — not the GStreamer pipeline
      that delivers the frame. Transport-layer issues (RTSP, GStreamer, relays) go to video-pipeline-engineer.

      </commentary>

      </example>'
    description_summary: Use for computer vision model work where frames are treated as tensors, including preprocessing,
      inference, postprocessing, coordinate transforms, and tracking. Specializes in object detection models such as YOLO/SSD/DETR,
      TensorRT optimization on Jetson, NMS, bounding-box remapping, accuracy regressions after model swaps, and multi-object
      trackers such as SORT, DeepSORT, NvDCF, and ByteTrack. Do not use for frame transport or media pipeline issues such
      as GStreamer tuning, RTSP behavior, relay configuration, encoder/muxer chains, timestamps, caps negotiation, decode,
      or render bottlenecks.
    description_hash: sha256:c39beab80f70c7871383b91d355e739734e2777a38beadd47cc828a988f27e3b
    body_hash: sha256:8360e3c294aa6e52f446a649bf7c5a9f787ae6ed3209596a5fe1ea51768856a1
