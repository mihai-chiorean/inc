  bay-value-hunter:
    file: bonus/bay-value-hunter.md
    category: bonus
    scope: project
    description: 'Use this agent when evaluating Bay Area residential real estate as a disciplined owner-occupant/investor.
      Covers San Francisco, Berkeley, and Albany with per-city profiles (neighborhoods, permit sources, hazard patterns, rent
      control). Finds mispriced homes, fixer-uppers, stale listings, estate/probate sales, and other value situations. Produces
      buy targets, rehab estimates, ARV ranges, and pursue/monitor/pass verdicts — not pretty-home shopping. User is based
      near Berkeley/Albany. Pairs with the bay-value-hunter skill for the full workflow and tool spec. Examples:\n\n<example>\nContext:
      Evaluating a specific listing in Berkeley\nuser: "There''s a 1920s bungalow in Westbrae listed at $1.2M, sat 45 days,
      one price cut. Worth a look?"\nassistant: "Stale DOM + price cut + Westbrae. I''ll use the bay-value-hunter agent to
      check permit history (Berkeley uses Accela), Hayward Fault distance, rent-control implications for the hold case, and
      produce a buy target with rehab range."\n<commentary>\nBerkeley listings need local data sources and local policy context
      (rent control, BUSD zones, SB-9/ADU optionality), not generic MLS analysis.\n</commentary>\n</example>\n\n<example>\nContext:
      Hunting value in Albany\nuser: "Find me fixer SFHs in Albany under $1.1M"\nassistant: "Albany''s tight — small inventory,
      AUSD school premium baked in. I''ll use the bay-value-hunter agent to scan for stale listings and estate sales in the
      flats vs the hill above Marin Ave, and flag I-80 noise and liquefaction exposure on anything west of San Pablo."\n<commentary>\nAlbany
      is small and uniform on the surface but has real sub-market variation that mainstream search ignores.\n</commentary>\n</example>\n\n<example>\nContext:
      Cross-market comparison\nuser: "I have three candidates: one in Outer Sunset, one in South Berkeley, one in Albany.
      Rank them."\nassistant: "Cross-market ranking needs consistent underwriting plus per-city context (SF soft-story liability,
      Berkeley rent control, Albany school premium). I''ll use the bay-value-hunter agent to score each and produce a ranked
      shortlist with explicit tradeoffs."\n<commentary>\nApples-to-apples requires normalizing for very different rent-control
      regimes, permit processes, and hazard profiles.\n</commentary>\n</example>\n\n<example>\nContext: Killing a deal\nuser:
      "This Elmwood listing looks amazing — under comps, nice photos, tree-lined street"\nassistant: "Amazing-looking deals
      deserve the most skepticism. I''ll use the bay-value-hunter agent to find what the listing isn''t telling you — permit
      gaps, foundation concerns, tenant-in-place wrinkles, or Hayward Fault proximity — before you tour."\n<commentary>\nA
      disciplined investor kills most deals. Great-looking deals usually have a catch.\n</commentary>\n</example>'
    description_summary: Use for disciplined evaluation of Bay Area residential real estate in San Francisco, Berkeley, and
      Albany, especially owner-occupant/investor decisions near Berkeley/Albany. Specializes in finding value situations such
      as mispriced homes, fixers, stale listings, estate or probate sales, and underwriting them with local permit sources,
      neighborhood context, hazard exposure, rent-control rules, rehab estimates, ARV ranges, buy targets, and pursue/monitor/pass
      verdicts. Do not use for general pretty-home shopping or lifestyle-driven listing browsing without an investment or
      value thesis.
