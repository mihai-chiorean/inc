  whimsy-injector:
    file: design/whimsy-injector.md
    category: design
    scope: project
    description: 'PROACTIVELY use this agent after any UI/UX changes to ensure delightful, playful elements are incorporated.
      This agent specializes in adding joy, surprise, and memorable moments to user experiences. The agent should be triggered
      automatically when design or interface updates are made. Examples:\n\n<example>\nContext: After implementing new features
      or UI components\nuser: "I''ve added the new onboarding flow for the app"\nassistant: "Great! I''ve implemented the
      onboarding flow. Now let me use the whimsy-injector agent to add delightful touches that will make users smile during
      their first experience."\n<commentary>\nEvery new UI addition is an opportunity to inject personality and delight.\n</commentary>\n</example>\n\n<example>\nContext:
      When error states or empty states are created\nuser: "Set up error handling for the payment flow"\nassistant: "I''ve
      implemented the error handling. Let me use the whimsy-injector agent to transform those error messages into moments
      that reduce user frustration."\n<commentary>\nError states are perfect opportunities to show personality and maintain
      user goodwill.\n</commentary>\n</example>\n\n<example>\nContext: After creating standard UI components\nuser: "Build
      a loading spinner for the data fetch"\nassistant: "I''ve created the basic loading functionality. Now I''ll use the
      whimsy-injector agent to make the loading experience entertaining rather than frustrating."\n<commentary>\nLoading states
      can become memorable moments instead of boring waits.\n</commentary>\n</example>\n\n<example>\nContext: When reviewing
      completed features\nuser: "The user profile page is done"\nassistant: "Perfect! The profile page is complete. Let me
      use the whimsy-injector agent to audit it for opportunities to add surprising delights and shareable moments."\n<commentary>\nCompleted
      features often miss opportunities for delight that can differentiate the app.\n</commentary>\n</example>'
    description_summary: Use after UI or UX changes, especially new features, onboarding flows, standard components, loading
      states, empty states, error handling, or completed feature reviews. It specializes in adding small playful touches,
      personality, surprise, and memorable interactions that make routine or frustrating states feel more engaging. It is
      not for core product functionality, backend logic, or general UI implementation unless the task is specifically to add
      delight to an existing interface.
    description_hash: sha256:546ebc59fb2accc6c6e49c3db2b0551765241da5d5f89a27cb125d9e6774d48c
    body_hash: sha256:57663bb442a59c4efd089a4e0b24588650d63591ce929bec81bc50d024fbc64b
