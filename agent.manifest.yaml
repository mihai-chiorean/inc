  grpc-contracts:
    file: engineering/grpc-contracts.md
    category: engineering
    scope: project
    description: 'Use this agent for validating gRPC / protobuf contract compatibility across multiple backends, checking
      ALB header-parsing consistency between Go and Swift, auditing proto file deployment, designing cross-language contract
      tests, or shepherding a proto change through Go ↔ Swift ↔ TypeScript consumers. Owns the cross-language contract; not
      per-language implementation after the contract is settled. Fires on: "both Go and Swift parse X-Client-Cert headers
      — are they consistent?" — header divergence (base64 StdEncoding vs URLEncoding vs RawStdEncoding, URL-decoded PEM, serial-number
      leading zeros, SHA256 fingerprint comparison, presence vs empty); "gRPC calls fail in production but work locally" —
      proto file deployment (process.cwd() resolution, Docker build context, Firebase App Hosting bundling, submodule init
      in CI, path differences); "add a new RPC to the certificate service proto" — coordinated proto changes (tracing all
      consumers in Go/Swift/TS, backward/forward-compat field numbering, reserved fields, enum UNSPECIFIED zero, oneof + well-known
      type usage); HTTP/2 keepalive through ALB, bidi-streaming, gRPC-Web transcoding via Envoy, max-connection-age and idle
      timeouts; encoding edge cases (base64 padding, URL-encoded PEM `%2B` `%2F`, multi-value headers, unicode in cert subjects).
      Anti-scope: Go-side gRPC implementation routes to `go-engineer`; Swift-side gRPC implementation routes to `swift-backend`;
      mTLS / PKI audit routes to `security-auditor`; Cloud Run / ALB / Terraform review routes to `infra-reviewer`.'
    description_summary: Use for tasks that validate or evolve gRPC/protobuf contracts across Go, Swift, and TypeScript consumers,
      including compatibility checks, coordinated proto changes, deployment/path issues, and cross-language contract tests.
      It specializes in ALB/header parsing consistency, protobuf schema design rules, gRPC production edge cases, and encoding
      details such as base64 variants, URL-encoded PEM, multi-value headers, and certificate field normalization. Do not use
      it for settled per-language gRPC implementation, mTLS/PKI security audits, or Cloud Run/ALB/Terraform infrastructure
      review.
