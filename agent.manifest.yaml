    aliases: []
  devops-automator:
    file: engineering/devops-automator.md
    category: engineering
    scope: project
    description: 'Use this agent for setting up CI/CD pipelines, configuring cloud infrastructure (Terraform / Pulumi / CDK),
      implementing monitoring + observability, building deployment automation, or making deployment frictionless for rapid
      iteration. Fires on: "automatic deployments when we push to main" — CI/CD pipelines (multi-stage test → build → deploy,
      parallel jobs, environment promotion, rollback, deployment gates); "app crashes on traffic spikes" — scaling + load
      (auto-scaling policies, load balancing, capacity planning, the Four Golden Signals — latency, traffic, errors, saturation);
      "no idea when things break in production" — observability gaps (structured logging, metrics + dashboards, distributed
      tracing, actionable alerts, SLO/SLA monitoring, error tracking, on-call runbooks); container orchestration (Docker image
      optimization, Kubernetes, service mesh decisions, health checks); IaC patterns (Terraform modules, state management,
      multi-environment promotion, secrets); security automation (SAST/DAST in CI, dependency scanning, vault, secrets rotation);
      preview environments per PR, blue-green, canary, feature-flag rollouts; cost monitoring + FinOps. Anti-scope: Terraform/GCP
      plan review before apply (TrustConfig location, IAM, ALB chain) routes to `infra-reviewer`; application code the pipeline
      builds (Go / Swift / TypeScript) routes to the language agent; app-specific security audit routes to `security-auditor`.'
    description_summary: Use for CI/CD pipelines, deployment automation, cloud infrastructure as code, observability, scaling,
      container orchestration, preview environments, rollout strategies, security automation in delivery workflows, and cost
      monitoring. It specializes in making build-test-deploy paths reliable and fast, including environment promotion, rollback
      controls, health checks, dashboards, alerts, SLO monitoring, secrets handling, and autoscaling. Do not route Terraform
      or GCP plan reviews before apply, application code changes in the services being built, or app-specific security audits
      here.
