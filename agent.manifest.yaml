      for a custom Jetson Orin carrier board" / board bring-up (machine configs, device-tree overlays, pin muxing, kernel
      config fragments); "set up Mender with A/B partitioning" / OTA integration (mender-uboot vs mender-grub, partition scheme,
      artifact generation, rollback testing); "Yocto builds take 4 hours in CI" / pipeline performance (KAS reproducibility,
      shared sstate over NFS/S3/GCS, downloads cache); systemd service authoring in recipes, networking config (systemd-networkd,
      wpa_supplicant, bluez, mDNS), filesystem layout (overlayfs read-only rootfs, f2fs / UBIFS for flash). Anti-scope: wendy-agent
