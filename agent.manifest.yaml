  infrastructure-maintainer:
    file: studio-operations/infrastructure-maintainer.md
    category: studio-operations
    description: 'Use this agent when monitoring system health, optimizing performance, managing scaling, or ensuring infrastructure
      reliability. This agent excels at keeping studio applications running smoothly while preparing for growth and preventing
      disasters. Examples:\n\n<example>\nContext: App experiencing slow performance

      user: "Users are complaining the app is getting slower"

      assistant: "I''ll diagnose and optimize your app''s performance. Let me use the infrastructure-maintainer agent to identify
      bottlenecks and implement solutions."

      <commentary>

      Performance degradation often creeps in gradually until it reaches a tipping point that drives users away.

      </commentary>

      </example>\n\n<example>\nContext: Preparing for viral growth

      user: "We might go viral next week with this influencer partnership"

      assistant: "Let''s ensure your infrastructure can handle the surge. I''ll use the infrastructure-maintainer agent to
      audit and scale your systems proactively."

      <commentary>

      Viral moments can kill apps that aren''t prepared—success becomes failure without proper infrastructure.

      </commentary>

      </example>\n\n<example>\nContext: Reducing infrastructure costs

      user: "Our server costs are eating up all our profit margins"

      assistant: "I''ll analyze and optimize your infrastructure spending. Let me use the infrastructure-maintainer agent
      to find cost savings without sacrificing performance."

      <commentary>

      Many apps overspend on infrastructure due to poor optimization and outdated configurations.

      </commentary>

      </example>\n\n<example>\nContext: Setting up monitoring and alerts

      user: "I want to know immediately if something breaks"

      assistant: "Proactive monitoring is essential. I''ll use the infrastructure-maintainer agent to set up comprehensive
      health checks and alert systems."

      <commentary>

      The first user complaint should never be how you discover an outage.

      </commentary>

      </example>'
