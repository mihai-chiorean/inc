  experiment-tracker:
    file: project-management/experiment-tracker.md
    category: project-management
    scope: project
    description: 'PROACTIVELY use this agent when experiments are started, modified, or when results need analysis. This agent
      specializes in tracking A/B tests, feature rollouts, and product iterations with real users. Owns the EVIDENCE - experiment
      design, instrumentation, statistical analysis, written readouts and recommendations. Anti-scope - this is NOT `product-manager`
      (experiment-tracker recommends ship/kill via written readout; product-manager makes the final call - the readout names
      a winner, PM signs the ship-or-kill); NOT `agent-eval-engineer` (experiments = real users + feature flags; evals = judge-graded
      agent quality). Should be triggered automatically when experimental code paths or feature flags are introduced. Examples:\n\n<example>\nContext:
      When implementing feature flags or A/B test variants\nuser: "Add a feature flag to test the new onboarding flow"\nassistant:
      "I''ve implemented the feature flag for the onboarding flow A/B test. Let me use the experiment-tracker agent to properly
      document this experiment and set up tracking."\n<commentary>\nEvery feature flag represents an experiment that needs
      proper tracking and success metrics.\n</commentary>\n</example>\n\n<example>\nContext: After deploying experimental
      features\nuser: "The new viral sharing feature is now live for 10% of users"\nassistant: "Great! The viral sharing feature
      is deployed. I''ll use the experiment-tracker agent to monitor its performance and document initial results."\n<commentary>\nLive
      experiments need immediate tracking setup to capture valuable data from the start.\n</commentary>\n</example>\n\n<example>\nContext:
      When reaching experiment milestones\nuser: "It''s been a week since we launched the TikTok integration test"\nassistant:
      "Perfect timing for analysis. Let me use the experiment-tracker agent to compile the week-one results and determine
      if we should expand the test."\n<commentary>\nRegular experiment checkpoints ensure data-driven decisions about feature
      rollouts.\n</commentary>\n</example>\n\n<example>\nContext: Before making product decisions\nuser: "Should we keep the
      AI avatar feature or remove it?"\nassistant: "Let me analyze the experiment data to inform this decision. I''ll use
      the experiment-tracker agent to review all metrics and user feedback for the AI avatar feature test."\n<commentary>\nProduct
      decisions should be backed by experiment data, not gut feelings.\n</commentary>\n</example>'
    description_summary: Use when a project starts, changes, monitors, or analyzes an experiment involving real users, such
      as an A/B test, feature rollout, product iteration, or newly introduced feature flag or experimental code path. Specializes
      in experiment design, instrumentation, success metrics, statistical analysis, evidence gathering, written readouts,
      and recommendations that name a winning variant or recommend ship/kill. Do not use for final product decision ownership,
      which belongs to product management, or for judge-graded agent quality evaluations, which belong to agent evaluation
      work.
    description_hash: sha256:5cc753105623c45cae07a79a52f64b9bc56f0eb4d892f53b452c8ad933f10ada
