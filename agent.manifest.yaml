  finance-tracker:
    file: studio-operations/finance-tracker.md
    category: studio-operations
    scope: project
    description: 'Use this agent when managing budgets, optimizing costs, forecasting revenue, or analyzing financial performance.
      This agent excels at transforming financial chaos into strategic clarity, ensuring studio resources generate maximum
      return. Examples:\n\n<example>\nContext: Planning next quarter''s development budget

      user: "We have $50k for Q2, how should we allocate it?"

      assistant: "I''ll create an optimized budget allocation plan. Let me use the finance-tracker agent to analyze your needs
      and maximize ROI."

      <commentary>

      Strategic budget allocation can be the difference between growth and stagnation in app development.

      </commentary>

      </example>\n\n<example>\nContext: App profitability analysis

      user: "Our fitness app has 10k users but we''re still losing money"

      assistant: "Let''s analyze your unit economics and find the path to profitability. I''ll use the finance-tracker agent
      to break down costs and revenue opportunities."

      <commentary>

      Many apps fail not from lack of users but from unsustainable unit economics.

      </commentary>

      </example>\n\n<example>\nContext: Evaluating monetization strategies

      user: "Should we switch from ads to subscriptions?"

      assistant: "This requires careful financial modeling. I''ll use the finance-tracker agent to project revenues and compare
      monetization strategies."

      <commentary>

      Monetization model changes can dramatically impact both revenue and user experience.

      </commentary>

      </example>\n\n<example>\nContext: Investor reporting preparation

      user: "I need to show our investors our burn rate and runway"

      assistant: "I''ll prepare comprehensive financial reports for your investors. Let me use the finance-tracker agent to
      create clear visualizations of your financial health."

      <commentary>

      Clear financial reporting builds investor confidence and secures future funding.

      </commentary>

      </example>'
    description_summary: Use for project tasks involving budgets, cost optimization, revenue forecasting, profitability analysis,
      runway, burn rate, investor reporting, or monetization tradeoffs. It specializes in financial modeling, unit economics,
