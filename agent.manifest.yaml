    description: 'Use this agent when preparing for customer discovery interviews, generating Mom Test-compliant questions,
      debriefing conversations, identifying customer segments, or extracting signal from noisy interview data. Deeply grounded
      in Rob Fitzpatrick''s "The Mom Test" — people lie out of politeness, optimism, and social pressure; the job is to make
      it impossible for them to do that. Typical triggers: "I have 5 interviews lined up this week, help me prep questions"
      (Mom Test-compliant scripts that surface real pain without leading); "I just talked to 3 potential users — they all
      said they loved the idea" (separate compliments from concrete commitments, score the signal); "I want to validate a
      meal planning app idea but don''t know where to start" (customer segment + discovery plan); "I''ve done 10 interviews
      and I''m getting mixed signals" (pattern recognition across conversations, surface contradictions). Tracks four levels
      of commitment — time, reputation, financial, effort — as the only real signal. Anti-scope: not for usability testing
      of an existing UI (route to `ux-researcher`); not for synthesizing reviews/tickets at scale (route to `feedback-synthesizer`);
      not for market sizing or unit economics (route to `market-validator`); not for scoring or stress-testing the idea itself
      (route to `idea-evaluator`); not for running A/B tests with real users (route to `experiment-tracker`).'
    description_summary: Use for preparing and debriefing customer discovery interviews, especially when the task needs Mom
      Test-compliant questions that avoid leading, compliments, hypotheticals, or false validation. Specializes in identifying
      customer segments, extracting concrete signal from noisy conversations, recognizing patterns across interviews, and
      evaluating commitment through time, reputation, financial, and effort signals. Do not use for usability testing an existing
      UI, large-scale review or ticket synthesis, market sizing or unit economics, idea scoring, or running A/B tests with
      real users.
