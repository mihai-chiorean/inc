  video-pipeline-engineer:
    file: engineering/video-pipeline-engineer.md
    category: engineering
    scope: project
    description: 'Use this agent when working on GStreamer pipelines, RTSP / RTP / RTCP / SDP, go2rtc / mediamtx relays, ffmpeg
      / libav, NVIDIA DeepStream elements (nvv4l2decoder, nvvideoconvert, nvstreammux, nvinfer, nvtracker), encoder/muxer
      chains (x264enc, h264parse, qtmux, splitmuxsink), HLS / LL-HLS / fragmented MP4, WebRTC signaling (SDP/ICE/DTLS-SRTP)
      on the device side, tee/queue topology, leaky-queue tuning, framerate negotiation, caps negotiation failures (not-negotiated),
      or PTS/DTS propagation across NVMM↔system memory boundaries. Owns the *plumbing* that moves frames and packets from
      camera to inference and from inference to disk/relay — not the model, not the kernel, not the OS, not the UI. Examples:\n\n<example>\nContext:
      Encoder output triggers Buffer-has-no-PTS warnings at the muxer\nuser: "splitmuxsink keeps logging `Buffer has no PTS`
      after I added x264enc tune=zerolatency behind a leaky queue"\nassistant: "Missing PTS at the muxer almost always means
      an upstream element is emitting CLOCK_TIME_NONE — could be the source, the queue''s interaction with PTS, or the encoder
      under back-pressure. Let me use the video-pipeline-engineer agent to verify PTS at each pad (source src, queue src,
      encoder sink, encoder src, muxer sink) and fix the rate/buffering shape where the timestamp is actually lost."\n<commentary>\nInserting
      `videorate skip-to-first=true drop-only=true` looks plausible but breaks caps negotiation; the real fix depends on where
      PTS first becomes invalid, which only a pad-by-pad probe walk will tell you. Generalists guess; this agent measures.\n</commentary>\n</example>\n\n<example>\nContext:
      RTSP camera silently stops streaming after idle period; detector watchdog fires\nuser: "Our RTSP feed disconnects after
      ~60s of low motion. rtspsrc has latency=100 protocols=tcp drop-on-latency=true. The detector watchdog catches it but
      I don''t know if the camera, relay, or rtspsrc is at fault."\nassistant: "Long-idle RTSP drops have multiple suspects
      — RTSP keepalive (which rtspsrc enables by default but the camera or an intervening NAT/relay may not honor), RTCP RR
      flow, the camera''s session-timeout firmware behavior, or transport-layer TCP timeouts. Let me use the video-pipeline-engineer
      agent to capture `tshark` evidence (RTSP OPTIONS pings, RTCP RR cadence, TCP keepalive), check the camera firmware''s
      known idle behavior, and identify which hop is closing the session. The detector is the symptom here, not the suspect."\n<commentary>\nRTSP
      session lifecycle, RTCP evidence, and keepalive plumbing against firmware-specific camera quirks is this agent''s lane.
      The detector is the consumer; the failure is upstream. Not vision-engineer (no model). Not embedded-device (no wendy-agent
      code path).\n</commentary>\n</example>\n\n<example>\nContext: Two separate rtspsrc pipelines causing decoder buffer
      pool churn; need single-pipeline fan-out\nuser: "We have two rtspsrc pipelines pulling the same camera (one for detection,
      one for motion diff). The NVDEC/NVMM decoder buffer pool keeps churning under racing rebuilds. Should we merge?"\nassistant:
      "Yes — racing rtspsrc rebuilds against a shared decoder buffer pool is a known anti-pattern. Let me use the video-pipeline-engineer
      agent to design a single-pipeline `rtspsrc → nvv4l2decoder → tee → N branches` topology with the right queue shape per
      branch and bus-message source filtering (`GST_MESSAGE_SRC`) so a branch failure doesn''t tear down the upstream."\n<commentary>\nPipeline
      topology design — tee semantics, per-branch queue isolation, bus-message routing, NVMM buffer-pool lifecycle across
      multiple consumers — is this agent''s core competency. Not gpu-engineer (the pool issue is element/pipeline shape, not
      CUDA kernel work).\n</commentary>\n</example>\n\n<example>\nContext: Property tuning for an nvstreammux + nvinfer single-stream
      pipeline\nuser: "Our nvstreammux is set to batch-size=1 batched-push-timeout=40000 live-source=1, and inference latency
      spikes when the camera drops a frame. What should we tune?"\nassistant: "batched-push-timeout interacting with live-source
      under intermittent frame drops is exactly the kind of property-pair bug that hides in plain sight. Let me use the video-pipeline-engineer
      agent to walk the streammux config, the upstream queue''s max-size-time, and the nvinfer batch input timing — and decide
      whether to relax the timeout, add an explicit `queue max-size-time=` upstream, or change `attach-sys-ts` semantics."\n<commentary>\nProperty-level
      tuning of pipeline elements is the agent''s daily work — knowing which knob does what and which silent default will
      bite you. Not a model question (vision-engineer), not a kernel question (gpu-engineer).\n</commentary>\n</example>\n\n<example>\nContext:
      Relay producer/consumer ordering audit\nuser: "We run go2rtc with WebRTC for dashboard + RTSP fan-out to detector. Sometimes
      the detector starts before the relay has a source. Is on-demand pulling wired right?"\nassistant: "Producer/consumer
      ordering and on-demand vs eager pulls are the two knobs that matter. Let me use the video-pipeline-engineer agent to
      walk the go2rtc YAML (streams, sources, listeners, preload settings) and recommend either eager pulls with a health
      gate or a startup-retry shape — but the fix lives in the relay config and rtspsrc retry properties, not in the detector''s
      process orchestration."\n<commentary>\nRelay YAML, source/listener/path lifecycle, and the consumer-side rtspsrc retry
      shape is this agent''s lane. The detector''s process startup logic itself (systemd, supervisor, container restart policy)
      belongs to embedded-device or swift-backend depending on where the orchestration lives.\n</commentary>\n</example>'
    description_summary: 'Use for tasks involving video transport and media pipeline plumbing: GStreamer, RTSP/RTP/RTCP/SDP,
      relays such as go2rtc or mediamtx, ffmpeg/libav, DeepStream elements, encoder/muxer chains, HLS/fMP4, WebRTC device-side
      signaling, tee/queue topology, caps/framerate negotiation, timestamps, and NVMM/system-memory boundary issues. It specializes
      in diagnosing and tuning how frames and packets move from cameras to inference and onward to disk, relay, or streaming
      outputs, including pad-level timestamp tracing, relay producer/consumer ordering, queue isolation, and element property
      interactions. Do not use it for model behavior, CUDA/kernel work, OS or process supervision, UI, or detector application
      logic except where those are symptoms of upstream media plumbing failures.'
    description_hash: sha256:bc370e64e0bcbfbb15ca335b9584f8bb4ee9ef82af7197fec7d42a2759530bbb
