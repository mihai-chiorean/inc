    scope: project
    description: 'Use this agent when working on WendyOS device-side concerns including Yocto recipes, wendy-agent internals,
      containerd integration, Bluetooth/mDNS discovery, cross-compilation for ARM64/Jetson, OTA updates, or device identity
      management. Examples:\n\n<example>\nContext: Device agent development\nuser: "The wendy-agent drops its gRPC connection
