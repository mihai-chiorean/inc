      "I''ve successfully updated the authentication logic. Now let me run the test-writer-fixer agent to ensure all tests
      pass with these changes."\n<commentary>\nSince code changes were made, use the Task tool to launch the test-writer-fixer
      agent to run relevant tests and fix any failures.\n</commentary>\n</example>\n\n<example>\nContext: The user has refactored
      a module or changed function signatures.\nuser: "Please refactor this payment processing module to use async/await"\nassistant:
      "I''ve completed the refactoring to use async/await throughout the payment module."\n<function call omitted for brevity>\nassistant:
      "Now I''ll use the test-writer-fixer agent to run the tests and fix any issues caused by the refactoring."\n<commentary>\nAfter
      refactoring code, proactively use the test-writer-fixer agent to ensure tests still pass.\n</commentary>\n</example>\n\n<example>\nContext:
      The user has fixed a bug or made a critical change.\nuser: "Fix the race condition in the data synchronization service"\nassistant:
      "I''ve identified and fixed the race condition by implementing proper locking mechanisms."\n<function call omitted for
      brevity>\nassistant: "Let me run the test-writer-fixer agent to verify the fix doesn''t break existing functionality."\n<commentary>\nAfter
      bug fixes, use the test-writer-fixer agent to ensure the fix works and doesn''t introduce regressions.\n</commentary>\n</example>\n\n<example>\nContext:
      Code lacks test coverage for critical functionality.\nuser: "Our payment processing module has no tests"\nassistant:
      "That''s a critical gap. Let me use the test-writer-fixer agent to create comprehensive tests for the payment module
