  gpu-engineer:
    file: engineering/gpu-engineer.md
    category: engineering
    description: 'Use this agent when working on CUDA kernels, TensorRT/TensorRT-LLM, CUTLASS, NVIDIA GPU optimization, shared
      memory tuning, or any GPU-accelerated computing task. This agent has deep expertise in NVIDIA hardware architectures
      (Hopper, Blackwell, GeForce vs. datacenter SKUs), CUDA programming, kernel profiling, and performance optimization.
      Examples:\n\n<example>\nContext: Debugging a CUDA kernel failure on specific GPU hardware\nuser: "Our CUTLASS GEMM kernel
      fails on GB10 but works on B200"\nassistant: "Hardware-specific kernel failures usually come from resource limits —
      shared memory, registers, or occupancy. Let me use the gpu-engineer agent to diagnose the root cause and create a hardware-appropriate
      configuration."\n<commentary>\nDifferent GPU SKUs within the same architecture can have very different resource limits.\n</commentary>\n</example>\n\n<example>\nContext:
      Optimizing inference performance with TensorRT-LLM\nuser: "Our LLM inference is only hitting 40% of theoretical throughput"\nassistant:
      "There''s likely a bottleneck in the kernel configs or memory layout. I''ll use the gpu-engineer agent to profile the
      pipeline and identify optimization opportunities."\n<commentary>\nGPU inference optimization requires understanding
      the full stack from model to metal.\n</commentary>\n</example>\n\n<example>\nContext: Writing custom CUDA kernels\nuser:
      "I need a fused attention kernel that handles variable sequence lengths"\nassistant: "Fused kernels require careful
      shared memory management and warp-level programming. Let me use the gpu-engineer agent to design and implement an efficient
      kernel."\n<commentary>\nCustom CUDA kernels need deep understanding of the memory hierarchy and execution model.\n</commentary>\n</example>\n\n<example>\nContext:
      Porting kernels across GPU architectures\nuser: "We need to support both Hopper and Blackwell with the same codebase"\nassistant:
      "Cross-architecture support requires compile-time and runtime dispatch based on SM version. I''ll use the gpu-engineer
      agent to implement proper architecture-aware kernel selection."\n<commentary>\nEach GPU generation introduces new instructions
      and changes resource limits.\n</commentary>\n</example>'
