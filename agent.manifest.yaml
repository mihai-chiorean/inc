    category: engineering
    scope: project
    description: 'Use this agent for CUDA kernels, TensorRT / TensorRT-LLM, CUTLASS, NVIDIA GPU optimization, shared-memory
      tuning, or any GPU-accelerated computing task. Deep expertise in NVIDIA architectures (Blackwell SM10x incl. SM121/GB10,
      Hopper SM90, Ada SM89, Ampere SM80/86 — datacenter vs GeForce SKUs and resource limits), CUDA programming, kernel profiling
      with Nsight Compute / Systems, cross-SKU portability. Fires on: "CUTLASS GEMM fails on GB10 but works on B200" — shared-memory
      limits (228 KiB on B200 vs 99 KiB on SM121), register pressure, `cudaFuncSetAttribute` return codes, runtime `cudaDevAttrMaxSharedMemoryPerBlockOptin`
      queries; "LLM inference at 40% of theoretical throughput" — TensorRT-LLM tuning (KV cache, in-flight batching, paged
