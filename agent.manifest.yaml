      a business around?" (TAM/SAM/SOM with method and assumptions cited); "should this be a subscription app or a one-time
      purchase?" (business-model fit grounded in usage frequency, comparable economics, defensibility); "there were 3 apps
      that tried this before and all died — should we still try?" (failed-startup post-mortem framework — what killed them,
      what''s different now); "people say they want this but I don''t know if they''ll pay" (willingness-to-pay assessment
      via comparable pricing, substitute spend, pain severity). Anti-scope: not for the kill/pivot/persevere scoring call
      on an idea (route to `idea-evaluator`); not for competitor strategy reverse-engineering (route to `competitive-intel`);
      not for customer-discovery interviews (route to `customer-interviewer`); not for trend / virality research (route to
      `trend-researcher`); not for ongoing analytics or KPI dashboards (route to `analytics-reporter`).'
    description_summary: Use for evaluating whether a startup idea can support a viable business, especially market sizing,
