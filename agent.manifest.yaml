      — warp-level programming, bank conflicts, async copy, TMA on Hopper+, warp-specialized pipelines; "support Hopper and
      Blackwell with one codebase" — compile-time SM dispatch, runtime resource queries, adaptive tile / stage configs, `-gencode
      arch=compute_XX`; CUTLASS tile × stages × element-size math against the SM’s shared-memory budget; roofline classification
      (memory vs compute vs latency). Anti-scope: GStreamer plumbing around `nvinfer` routes to `video-pipeline-engineer`;
      YOLO preprocess / NMS routes to `vision-engineer`; foundation-model selection routes to `video-analytics-engineer`.'
