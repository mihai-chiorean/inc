  embedded-linux:
    file: engineering/embedded-linux.md
    category: engineering
    scope: project
    description: 'Use this agent for embedded Linux and Yocto/OpenEmbedded work including writing and debugging recipes, BSP
      integration, kernel configuration, bootloader setup, OTA updates (Mender/SWUpdate), cross-compilation, device tree customization,
      and CI/CD for embedded builds. Covers Jetson (meta-tegra), Raspberry Pi (meta-raspberrypi), and general ARM64 targets.
      Examples:\n\n<example>\nContext: Yocto build failure\nuser: "bitbake core-image-minimal fails with a do_compile error
      in our custom recipe"\nassistant: "Recipe build failures need layer-aware debugging. Let me use the embedded-linux agent
      to trace the error through the recipe, dependencies, and build configuration."\n<commentary>\nYocto compile failures
      can stem from missing dependencies, incorrect SRC_URI, toolchain issues, or layer priority conflicts. Systematic log
      analysis is essential.\n</commentary>\n</example>\n\n<example>\nContext: Board bring-up\nuser: "We need to add support
      for a custom carrier board based on Jetson Orin"\nassistant: "Custom carrier boards need BSP-level changes. I''ll use
      the embedded-linux agent to handle the device tree, kernel config, and machine configuration."\n<commentary>\nJetson
      carrier board support involves meta-tegra machine configs, device tree overlays, and potentially pin multiplexing changes.\n</commentary>\n</example>\n\n<example>\nContext:
      OTA update integration\nuser: "Set up Mender for our Raspberry Pi image with A/B partitioning"\nassistant: "Mender integration
      touches the partition layout, bootloader, and image generation. Let me use the embedded-linux agent to configure meta-mender
      for your target."\n<commentary>\nMender requires careful partition scheme setup, U-Boot integration for rollback, and
      proper artifact generation in the build.\n</commentary>\n</example>\n\n<example>\nContext: CI/CD pipeline\nuser: "Our
      Yocto builds take 4 hours in CI, how do we speed this up?"\nassistant: "Long Yocto CI builds usually mean poor sstate-cache
      utilization. I''ll use the embedded-linux agent to optimize your pipeline with KAS and proper caching."\n<commentary>\nWith
      shared sstate-cache and downloads, incremental Yocto builds should take under 30 minutes. KAS makes this reproducible.\n</commentary>\n</example>'
    description_summary: Use for embedded Linux work involving Yocto/OpenEmbedded builds, recipe debugging, BSP integration,
      kernel and bootloader configuration, device trees, cross-compilation, OTA update frameworks, and CI/CD for embedded
      image builds. It specializes in ARM64 targets including Jetson with meta-tegra, Raspberry Pi with meta-raspberrypi,
      and custom board bring-up where layer configuration, machine definitions, partition layout, and build caching matter.
      Do not route general application development, cloud-only CI, or non-Linux firmware tasks here unless they directly affect
      the embedded Linux build or runtime platform.
    description_hash: sha256:dd2add70422658e8b6053980aec303a10ac0bd86413d662e7ea23191404162d2
