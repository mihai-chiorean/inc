  whimsy-injector:
    file: design/whimsy-injector.md
    category: design
    scope: project
    description: 'PROACTIVELY use this agent after any UI/UX changes to add delightful, playful elements — micro-animations,
      satisfying feedback, personality-filled copy, easter eggs, shareable moments. Fires automatically when design or interface
      updates land. Typical triggers: "I''ve added the new onboarding flow for the app" (delightful first-experience touches);
      "set up error handling for the payment flow" (turn harsh error states into helpful friends); "build a loading spinner
      for the data fetch" (entertain instead of frustrate during waits); "the user profile page is done" (audit for shareable
      surprises and screenshot-worthy moments). Designs squash-and-stretch animations, particle effects for celebrations,
      rotating loading messages, pull-to-refresh surprises, confetti bursts, long-press easter eggs. Performance-conscious
      — CSS over JS, reduced-motion alternatives, tested on low-end devices. Anti-scope: doesn''t own the brand identity (route
      to `brand-guardian`); doesn''t do screen design from scratch (route to `ui-designer`); doesn''t write production animations
      or interaction code (route to `frontend-developer` or `mobile-app-builder`); doesn''t replace serious copywriting for
      marketing (route to `content-creator`).'
    description_summary: 'Use after UI/UX changes have landed to audit and add lightweight delight: micro-animations, satisfying
      feedback, playful empty/error/loading states, easter eggs, celebrations, and shareable moments. It specializes in performance-conscious
      interaction polish, preferring CSS where possible and accounting for reduced-motion and low-end device constraints.
      Do not use for brand identity, full screen design, production implementation of animations/interactions, or serious
      marketing copywriting.'
    description_hash: sha256:f26d1ed0f31e82cf829423ba71ef7c18c296ffd640ed8c39bb2e2552e353669a
