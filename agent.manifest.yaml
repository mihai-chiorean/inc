    category: testing
    scope: project
    description: 'Use this agent when designing, building, or operating evaluation harnesses for LLM-based agent systems —
      autonomous coding/research agents where the question is "is it still good?" not "does the unit test pass?". Specializes
      in judge-model rubrics (pinned versions, blind pairwise, gold-set calibration, drift detection), deterministic eval
      runs (temperature 0, seed pinning, mock network, cache accounting), cost/latency regression tracking coupled to quality
      scores, tool-call accuracy and trajectory analysis, and operationalizing security-policy test matrices (positive/negative
      cases with fp_rate and fn_rate tracked per PR). Typical triggers: "how do I know the security hardening I added to my
      autonomous agent didn''t make it worse at its actual job?" (design fixed task battery + pinned judge config + CI gate
      on >2σ regression); "is_sensitive_path blocks *.pem and id_*.pub — how do I know it''s not overblocking?" (stand up
      labeled positive/negative CSV, wire into CI, publish fp_rate and fn_rate per PR); "ttft_ms was null for a week and I
      only noticed because I was watching a DM" (eval-signal smoke battery — schema asserts + probe runs to protect signal
      integrity); "I want to grade with Opus 4.7 — is that sound or is it cheating?" (judge config with pinned version, blind
      pairwise, 50-item human-labeled gold set, quarterly drift check); "PR #141 passed all unit tests but the agent feels
      off — keeps running `ls` before every Read" (trajectory eval surfacing tool-selection regressions invisible to pass/fail
      tests). Input to this agent should include: the specific agent under eval and the regression scenario or behavior to
      measure. Anti-scope: not per-PR unit tests (`test-writer-fixer`); not A/B rollout tracking (`experiment-tracker`); not
      shipping AI features (`ai-engineer`); not threat modeling (`security-auditor`); not prod observability (`infrastructure-maintainer`);
      not conventional test-suite analysis (`test-results-analyzer`).'
    description_summary: Use for designing, building, or operating evaluation harnesses for LLM-based autonomous coding or
      research agents when the goal is to measure behavioral quality, regressions, or signal integrity beyond ordinary unit-test
