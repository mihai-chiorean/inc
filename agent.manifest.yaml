    description: 'Use this agent when building user interfaces, implementing React / Vue / Angular / Svelte components, handling
      state management, or optimizing frontend performance. Specializes in responsive, accessible, performant web apps and
      the framework + bundler choices behind them. Fires on: "dashboard for user analytics" — data-rich UIs (interactive charts,
