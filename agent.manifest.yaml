  release-engineer:
    file: project-management/release-engineer.md
    category: project-management
    scope: project
    description: 'Use this agent when planning a release, designing rollout strategy (canary, percentage rollout, region-by-region),
      defining rollback drills, coordinating launch-day monitoring, owning the operational side of getting a code-complete
      feature into users'' hands. Picks up where `tpm` leaves off (at code-complete) and runs through post-launch monitoring.
      Anti-scope - this is NOT `tpm` (TPM owns program readiness pre-code-complete; release-engineer takes over at code-complete);
      NOT `devops-automator` (release-engineer owns the *process* of shipping a specific release; devops-automator builds
      the underlying CI/CD plumbing); NOT `growth-hacker` or `app-store-optimizer` (release-engineer owns engineering-side
      launch readiness; GTM positioning, store listings, and viral copy live in marketing agents). Examples:\n\n<example>\nContext:
      Code-complete on a non-trivial feature\nuser: "swift-backend has tagged the v1.4 build. Time to ship."\nassistant: "Operational
      readiness is the release-engineer''s job. Let me use the release-engineer agent to define the rollout plan (canary %
      → 25% → 100%), the rollback trigger criteria, the on-call rotation for launch day, and the dashboard / log queries we''ll
      watch."\n<commentary>\nA release plan names the unhappy paths and the cutover criteria, not just the timeline.\n</commentary>\n</example>\n\n<example>\nContext:
      Mid-rollout regression detected\nuser: "Error rate jumped 2x at the 25% mark."\nassistant: "Mid-rollout incident response
      is in scope. Let me use the release-engineer agent to assess against the pre-defined rollback trigger, execute the rollback
      if criteria are met, and coordinate the post-incident write-up."\n<commentary>\nRollback decisions are pre-committed.
      release-engineer executes the documented criteria; doesn''t relitigate them mid-incident.\n</commentary>\n</example>\n\n<example>\nContext:
      Launch readiness review before ship-day\nuser: "We''re shipping the new auth migration tomorrow."\nassistant: "T-1 launch
      readiness check is the release-engineer''s job. Let me use the release-engineer agent to walk the launch checklist:
      rollout plan signed off, rollback drill run within 7 days, monitoring dashboards configured, on-call paged, and anti-checklist
      - has security-auditor signed off, has tpm closed all blocking deps?"\n<commentary>\nLaunch readiness is concrete and
      binary. Either the checklist is done or it isn''t. No vibes.\n</commentary>\n</example>'
    description_summary: 'Use for the operational phase of shipping a code-complete release: rollout planning, canary or percentage
      ramps, region sequencing, launch-day monitoring, rollback criteria, drills, and post-launch follow-up. Specializes in
      turning a finished build into a controlled release with explicit cutover gates, observability, on-call coordination,
      and incident response during rollout. Do not use for pre-code-complete program readiness, building CI/CD infrastructure,
      or marketing, app store, GTM, and growth work.'
