      reporting Crashlytics / Sentry, app-size, asset variants). Anti-scope: server-side Swift routes to `swift-backend`;
      web/responsive UIs route to `frontend-developer`; backend API design routes to `backend-architect`; cross-language gRPC
      contract issues route to `grpc-contracts`.'
