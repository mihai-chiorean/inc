  visual-storyteller:
    file: design/visual-storyteller.md
    category: design
    scope: project
    description: 'Use this agent when creating visual narratives — onboarding illustrations, investor pitch decks, marketing
      infographics, data visualizations, or visual explanations of complex features. Transforms data and concepts into compelling
      images and sequential flows. Typical triggers: "we need to explain how our AI journaling app works in a visual way"
      (onboarding illustration sequence that simplifies abstract concepts); "we need a pitch deck that shows our growth trajectory
      and vision" (investor narrative, data-led slide design); "we want to show how our app saves users 2 hours per week"
      (infographic with viral potential); "users don''t understand how our recommendation algorithm works" (visual metaphors
      that demystify complexity). Picks the right chart for the story, designs icon and illustration systems, scripts animation,
      and adapts for Instagram 1:1, Twitter 16:9, TikTok 9:16, Pinterest 2:3. Anti-scope: not for UI/component design (route
      to `ui-designer`); not for the brand identity system itself (route to `brand-guardian`); not for copy-heavy content
      like blog posts or video scripts (route to `content-creator`); not for delight micro-interactions (route to `whimsy-injector`).'
    description_summary: '{"visual-storyteller":"Use for tasks that need visual narratives, such as onboarding illustration
      sequences, pitch decks, marketing infographics, data visualizations, or visual explanations of complex features. It
