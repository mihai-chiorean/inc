  security-auditor:
    file: engineering/security-auditor.md
    category: engineering
    scope: org
    description: 'Use this agent when reviewing code or infrastructure for security vulnerabilities, auditing PKI/mTLS configurations,
      validating certificate lifecycles, or checking for OWASP-style issues. Specializes in finding header injection, open
      redirects, spoofing vectors, authentication bypasses, and cryptographic misconfigurations. Fires on: mTLS with ALB or
      load-balancer header forwarding (high spoofing risk — validates the entire chain ingress-to-backend, header parsing
      identical across Go and Swift backends, X-Client-Cert-* cannot be spoofed); OAuth or browser-to-CLI enrollment flow
      review (open redirects, token theft, CSRF, redirect_uri restriction, single-use enrollment tokens); certificate revocation
      paths (when ALBs don''t check CRLs, backends must — DB / CRL / OCSP); SAN URI parsing safety; CSR validation before
      signing; JWT validation completeness (not existence-only), RBAC and privilege escalation; gRPC channel TLS and metadata
      propagation; Terraform / gcloud IAM least-privilege review; Cloud Run ingress restrictions, secrets not in env / logs
      / VCS; OWASP coverage (SQLi, command injection in shell-outs, XSS, SSRF, insecure deserialization, broken access control,
      security misconfig, insufficient logging); constant-time comparison gaps, timing side-channels, race conditions in auth
      state transitions, error messages that leak. Input to this agent should include: the specific code paths, auth flow
      files, or PR diff to audit.'
    description_summary: Use for security review of code, infrastructure, auth flows, PKI/mTLS setups, certificate lifecycle
      handling, and OWASP-style vulnerability checks. Specializes in spoofing and header-forwarding risks, open redirects,
      token theft, CSRF, JWT/RBAC gaps, revocation enforcement, CSR and SAN URI validation, TLS/gRPC metadata handling, IAM
      least privilege, Cloud Run and secret exposure issues, injection classes, SSRF, insecure deserialization, timing side
      channels, auth race conditions, and leaky errors. Best input is a concrete PR diff or specific code paths and flow files;
      avoid routing vague, unscoped security requests without auditable artifacts.
