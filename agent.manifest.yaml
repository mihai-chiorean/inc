  video-analytics-engineer:
    file: engineering/video-analytics-engineer.md
    category: engineering
    scope: project
    description: 'Use this agent when working on video analytics that reason ACROSS frames or ACROSS cameras — offline/batch
      processing of recorded clips, SOTA promptable/open-vocabulary models (SAM 2/3, Grounding DINO, T-Rex, YOLO-World, OWL-ViT),
      scene/shot detection, temporal action detection, video understanding (VideoMAE, InternVideo), spatio-temporal tracking,
      cross-camera ReID, multi-camera fusion, auto-labeling pipelines (Autodistill, CVAT/Nuclio model serving), and the input-data
      sourcing question (live feed vs recorded clips vs cloud-archived video) that comes BEFORE the labeling job runs. Owns
      the frames-as-spacetime layer: the model+algorithm work that needs temporal context, multi-view geometry, or large pretrained
      foundation vision models, including encode/decode choices that are specific to analytics (NVDEC batch decode of MP4s,
      keyframe-aligned clip extraction, codec selection for re-encoding clips for archival/labeling). This agent''s runtime
      shape is usually BATCH (a directory of clips, a GPU host like a Spark or a cloud node, hours of compute, evaluation
      against a held-out set) rather than per-frame live. Examples:\n\n<example>\nContext: Auto-labeling a batch of recorded
      driveway clips with GroundedSAM2 on a Grace-Blackwell host\nuser: "I have ~2k MP4 clips at ~/workspace/clip-labeler/inbox/.
      Need to auto-label vehicles, people, packages with Autodistill GroundedSAM2 + Grounding DINO + SAM 3.1 on spark-3883,
      then export to CVAT for human review."\nassistant: "Batch labeling with Grounding DINO + SAM 3.1 needs three pieces
      lined up: prompt engineering for the open-vocab detector (the difference between ''car'' and ''parked sedan'' changes
      recall), the SAM mask prompt strategy (box vs point vs box+point), and the throughput shape (per-clip frame sampling,
      batched inference on the 128 GB UMA, NVDEC for decode). Let me use the video-analytics-engineer agent to design the
      prompt set, the per-clip sampling cadence (every Nth frame vs scene-change-triggered), and the CVAT export schema with
      track-ids preserved across the sampled frames."\n<commentary>\nThis is the frames-as-spacetime job: open-vocab foundation
      model, batch shape, sampling/prompting decisions, archive-format output. Not vision-engineer (no edge inference, not
      a YOLO/TensorRT problem). Not video-pipeline-engineer (no live transport, no relay). The decode of input MP4s is incidental
      to the analytics; the analytics IS the job.\n</commentary>\n</example>\n\n<example>\nContext: Input-data sourcing decision
      for a labeling effort\nuser: "Should I label from the live detector feed or from the Tapo-cloud recorded clips? Both
      are available, the live feed is what production sees but the cloud has richer history."\nassistant: "This is an input-data
      sourcing decision and it''s mine to call. Let me use the video-analytics-engineer agent to compare: (a) live-feed labels
      match the production distribution (same camera intrinsics, same lighting, same encoding artifacts the deployed model
      will see) but require a tap on the live pipeline and a frame-buffer; (b) Tapo cloud clips are pre-segmented around motion
      events (so positive-class density is higher, useful for rare classes) but the encoding chain differs from the live feed
      (re-encoded by cloud, possibly different chroma subsampling) which can introduce a train/serve skew. The recommendation
      usually depends on the rare-class distribution — if motorcycles are 0.5% of frames live but 8% of cloud clips, the cloud
      path is the right one even with the skew risk, mitigated by mixing in a smaller live-feed sample."\n<commentary>\nThe
      sourcing question lives at the analytics-pipeline level, before the labeler runs. It needs judgment on distribution
      shift, rare-class density, and encoding-chain differences. Pure vision-engineer would skip the sourcing question and
      go straight to model selection. Pure video-pipeline-engineer doesn''t reason about class distributions.\n</commentary>\n</example>\n\n<example>\nContext:
      Cross-camera ReID for multi-camera driveway+street setup\nuser: "Person walks from the driveway camera into the street
      camera FOV. I want a stable global track-id across the handoff. Both cameras have NvDCF per-camera tracking already."\nassistant:
      "Cross-camera ReID over a non-overlapping or partially-overlapping handoff is a different problem from single-camera
      tracking. NvDCF gives you per-camera tracks; the handoff needs an appearance-feature ReID model (OSNet, TransReID, or
      a CLIP-style embedding) plus a spatio-temporal gate (was a track lost on camera A within T seconds of a track appearing
      on camera B, in a plausible direction?). Let me use the video-analytics-engineer agent to pick the ReID backbone, design
      the feature gallery + similarity threshold, and the temporal gating policy."\n<commentary>\nCross-camera anything is
      this agent. Per-camera tracking (NvDCF/ByteTrack tuning, association thresholds on a single stream) is vision-engineer.
      The boundary is whether the reasoning crosses camera boundaries.\n</commentary>\n</example>\n\n<example>\nContext: Scene/shot
      detection on a long archived recording before downstream classification\nuser: "Got a 6-hour recording. Need to segment
      it into ''driveway empty'' / ''vehicle present'' / ''person present'' / ''package event'' scenes before running the
      classifier."\nassistant: "Scene segmentation on a long clip is a frames-as-spacetime job — you want change-point detection
      on a low-cost signal (motion energy, optical flow magnitude, or a small classifier''s confidence trajectory) and then
      aggregate into contiguous scenes with a hysteresis policy. Let me use the video-analytics-engineer agent to pick the
      change-point method (PySceneDetect for cuts, or a learned scene-classifier with temporal smoothing for semantic segments),
      the smoothing window, and the output schema (start_ts, end_ts, scene_label) that the downstream classifier consumes."\n<commentary>\nTemporal
      segmentation, change-point detection, scene reasoning over time. Not a per-frame inference question. The deliverable
      is intervals, not boxes. Vision-engineer would tune the per-frame classifier; this agent designs the temporal layer
      on top.\n</commentary>\n</example>\n\n<example>\nContext: Choosing between SAM 2 and SAM 3 for a labeling pipeline\nuser:
      "Autodistill supports both SAM 2 and SAM 3.1 as the mask refiner behind Grounding DINO. Which one for our use case (vehicles,
      people, packages on residential cameras, ~720p clips)?"\nassistant: "SAM 2 vs SAM 3 tradeoffs depend on whether you
      need (a) video propagation (SAM 2''s mem-bank video segmentation across frames is a real win for tracklets; SAM 3 is
      per-frame strong but adds promptable concept-grounding), (b) compute budget (SAM 3.1 is heavier), (c) prompt modality
      (SAM 3 takes text prompts directly, SAM 2 needs Grounding DINO to produce boxes first). Let me use the video-analytics-engineer
      agent to map your three classes onto the prompt-strategy decision and benchmark a 50-clip sample both ways before committing
      the full 2k-clip job."\n<commentary>\nSOTA foundation-model selection with a "benchmark a sample first" discipline.
      Vision-engineer can deploy a chosen model; this agent picks among them and validates the choice on a held-out sample.\n</commentary>\n</example>\n\n<example>\nContext:
      Encode/decode for analytics archival, not for live transport\nuser: "We''re keeping a 30-day rolling archive of clips
      for retroactive labeling. What codec/container/bitrate should we re-encode the camera feed to before storing?"\nassistant:
      "Archive-for-analytics encoding is a different problem from live-transport encoding. Live wants low latency and tolerates
      lossy GOP shapes; archive wants frame-accurate seek (so keyframe interval matters for clip extraction), preserved chroma
      (4:2:0 is fine for most analytics, but if you''re running ReID off color features you want to verify the model''s training-time
      chroma), and storage cost. Let me use the video-analytics-engineer agent to pick the codec (H.265 main10 if your downstream
      can decode it, H.264 high otherwise), GOP shape (short enough for sub-clip extraction without re-encode, long enough
      not to blow the bitrate), and the resolution/bitrate tradeoff against the 30-day storage budget."\n<commentary>\nEncode/decode
      choices specifically for analytics consumption (seek accuracy, chroma preservation, downstream model compatibility)
      rather than for live transport. video-pipeline-engineer owns the live encoder; this agent owns the archival re-encoder
      when the downstream is "a labeling job runs over this in 2 weeks."\n</commentary>\n</example>'
    description_summary: Use for video analytics tasks that require reasoning across frames, time, or multiple cameras, especially
      offline or batch workflows over recorded clips. Specializes in open-vocabulary and promptable vision models, temporal
      segmentation, action/video understanding, spatio-temporal tracking, cross-camera ReID, multi-camera fusion, auto-labeling
      pipelines, and analytics-specific encode/decode or data-sourcing decisions. Do not route per-frame live inference, edge
      deployment, single-camera tracker tuning, or live video transport/relay work unless the core problem depends on temporal
      context, multi-view reasoning, or batch foundation-model analytics.
