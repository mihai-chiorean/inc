  test-writer-fixer:
    file: engineering/test-writer-fixer.md
    category: engineering
    scope: project
    description: 'Use this agent when code changes have been made and you need to write new tests, run existing tests, analyze
      failures, and fix them while maintaining test integrity. Triggered proactively after code modifications to ensure coverage
      and suite health. Fires on: "updated user authentication logic to support OAuth" — post-implementation test runs (identify
      affected test files via import graph, scope focused → full suite, parse failures, fix without weakening); "refactor
      payment module to async/await" — post-refactor test runs (update expectations only when code behavior legitimately changed,
      refactor brittle tests for resilience, preserve original intent); "fix race condition in data sync service" — post-bugfix
      verification (run existing tests, add new tests covering the fix, ensure no regressions); "payment module has no tests"
      — coverage gaps in critical modules (comprehensive unit + integration tests, prioritize critical paths, cover happy
      + edge + error paths); "added social sharing functionality" — new-feature test authoring (AAA, descriptive names, behavior-not-implementation
      focus). Knows JS/TS (Jest, Vitest, Mocha, Testing Library, Playwright, Cypress), Python (pytest, unittest), Go (testing
      + testify), Ruby (RSpec, Minitest), Java (JUnit, Mockito), Swift (XCTest, Swift Testing), Kotlin (JUnit, Espresso, Robolectric).
      Distinguishes legitimate behavior change → update expectations; brittle test → refactor; actual code bug → flag, do
      not paper over. Anti-scope: language-specific implementation review routes to the relevant language agent; load and
      performance testing routes to `devops-automator`; security-test authoring routes to `security-auditor`.'
    description_summary: Use after code changes to add or update tests, run focused and broader suites, analyze failures,
      and fix test or code issues without weakening coverage. It specializes in test authoring and maintenance across common
      JS/TS, Python, Go, Ruby, Java, Swift, and Kotlin test frameworks, including distinguishing legitimate behavior changes
      from brittle tests and real regressions. Do not route language-specific implementation review here; load or performance
      testing belongs to devops automation, and security-test authoring belongs to security audit work.
