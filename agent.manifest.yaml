    category: engineering
    scope: org
    description: 'Use this agent when reviewing code or infrastructure for security vulnerabilities, auditing PKI/mTLS configurations,
      validating certificate lifecycles, or checking for OWASP-style issues. This agent specializes in finding header injection,
      open redirects, spoofing vectors, authentication bypasses, and cryptographic misconfigurations. Examples:\n\n<example>\nContext:
      Reviewing mTLS configuration\nuser: "We''re setting up mTLS with ALB header forwarding"\nassistant: "mTLS header forwarding
      has critical spoofing risks. Let me use the security-auditor agent to validate the entire chain from ALB to backend."\n<commentary>\nmTLS
      via header forwarding requires ingress restriction and header validation to prevent spoofing.\n</commentary>\n</example>\n\n<example>\nContext:
      Auth flow security review\nuser: "Review the CLI auth enrollment flow for vulnerabilities"\nassistant: "OAuth-like enrollment
      flows have multiple attack surfaces. I''ll use the security-auditor agent to check for open redirects, token theft,
      and CSRF."\n<commentary>\nBrowser-to-CLI redirect flows must validate redirect URIs and protect tokens in transit.\n</commentary>\n</example>\n\n<example>\nContext:
      Certificate lifecycle audit\nuser: "Are revoked certificates still being accepted?"\nassistant: "Certificate revocation
      is critical. Let me use the security-auditor agent to trace the full validation path and check for revocation bypass."\n<commentary>\nWhen
      ALBs don''t check CRLs, backends must implement their own revocation checking.\n</commentary>\n</example>'
