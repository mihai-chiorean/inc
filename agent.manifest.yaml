  customer-interviewer:
    file: product/customer-interviewer.md
    category: product
    scope: project
    description: 'Use this agent when preparing for customer discovery interviews, generating interview questions, debriefing
      after conversations, or validating problem hypotheses through user conversations. This agent is deeply grounded in "The
      Mom Test" methodology — it ensures you learn from customers without leading them or fishing for compliments. Examples:\n\n<example>\nContext:
      Preparing for customer discovery interviews\nuser: "I think there''s an opportunity in helping freelancers manage their
      taxes. I have 5 interviews lined up this week."\nassistant: "Great — let me use the customer-interviewer agent to prepare
      a Mom Test-compliant interview script that uncovers real tax pain points without leading your interviewees."\n<commentary>\nInterview
      prep is the highest-leverage moment. Bad questions waste everyone''s time and produce false validation.\n</commentary>\n</example>\n\n<example>\nContext:
      Debriefing after customer conversations\nuser: "I just talked to 3 potential users. They all said they loved the idea!"\nassistant:
      "Let''s check if that''s real signal or just politeness. I''ll use the customer-interviewer agent to debrief those conversations
      and separate facts from compliments."\n<commentary>\nPeople are polite. The Mom Test teaches us to look past enthusiasm
      and find commitments and concrete behaviors.\n</commentary>\n</example>\n\n<example>\nContext: Figuring out who to talk
      to\nuser: "I want to validate a meal planning app idea but don''t know where to start"\nassistant: "Before building
      anything, let''s figure out who to talk to and what to ask. I''ll use the customer-interviewer agent to design your
      customer discovery plan."\n<commentary>\nWho you talk to matters as much as what you ask. The agent helps identify the
      right customer segments.\n</commentary>\n</example>\n\n<example>\nContext: Extracting signal from noisy conversations\nuser:
      "I''ve done 10 interviews and I''m getting mixed signals. Some people care about the problem, others don''t."\nassistant:
      "Mixed signals usually mean you''re talking to different segments or asking the wrong questions. Let me use the customer-interviewer
      agent to analyze your interview notes and find the real patterns."\n<commentary>\nPattern recognition across interviews
      is where the gold is — but only if the data is clean.\n</commentary>\n</example>'
    description_summary: Use for preparing customer discovery interviews, choosing interview segments, generating non-leading
      questions, debriefing conversations, and validating problem hypotheses through user interviews. It specializes in applying
      The Mom Test methodology to separate concrete past behavior, real pain, commitments, and segment patterns from compliments
      or vague enthusiasm. It should not be used to seek validation by pitching an idea, asking leading questions, or treating
      positive reactions as evidence without behavioral signal.
    description_hash: sha256:822b1bdaecdefdba95bfb6dabee5a9bd8cd3e8827256d8f6c119ec0bf937cacd
    body_hash: sha256:6499b9c49dc39d0ec322832c42a3d5eb7f3a55e4fd1c2ddce10bae5b4252df06
