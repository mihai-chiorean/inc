      Cross-compilation\nuser: "The Swift binary crashes on Jetson but works on macOS"\nassistant: "ARM64 cross-compilation
      has platform-specific issues. Let me use the embedded-device agent to check architecture, linking, and runtime dependencies."\n<commentary>\nCross-compiled
      Swift binaries may have different Foundation behavior or missing system libraries.\n</commentary>\n</example>'
    description_summary: Use for WendyOS device-side work involving Yocto builds and recipes, wendy-agent behavior, containerd
