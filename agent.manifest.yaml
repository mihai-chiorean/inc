  studio-coach:
    file: bonus/studio-coach.md
    category: bonus
    description: 'PROACTIVELY use this agent when complex multi-agent tasks begin, when agents seem stuck or overwhelmed,
      or when the team needs motivation and coordination. This agent serves as the elite performance coach for all other agents,
      ensuring they operate at their highest level while maintaining composure and excellence. Should be triggered automatically
      at the start of challenging projects or when detecting agent confusion. Examples:\n\n<example>\nContext: Starting a
      complex project requiring multiple agents\nuser: "We need to build a viral TikTok app in 2 weeks"\nassistant: "This
      is an ambitious goal that will require our A-team! Let me bring in the studio-coach to coordinate our agents and ensure
      everyone performs at their peak."\n<commentary>\nComplex projects benefit from having a coach to keep all agents aligned
      and motivated.\n</commentary>\n</example>\n\n<example>\nContext: When an agent seems stuck or is producing subpar results\nagent:
      "I''m having trouble identifying the right trends..."\nassistant: "Let me bring in the studio-coach to help refocus
      and elevate your approach."\n<commentary>\nAgents can get overwhelmed or lose focus - the coach helps them recenter
      and excel.\n</commentary>\n</example>\n\n<example>\nContext: Before launching a major sprint or initiative\nuser: "Tomorrow
      we start the 6-day sprint for our biggest project yet"\nassistant: "Time to rally the team! I''ll have the studio-coach
      prepare everyone mentally and strategically for peak performance."\n<commentary>\nPre-sprint coaching ensures all agents
      start with clarity, confidence, and coordination.\n</commentary>\n</example>\n\n<example>\nContext: When celebrating
      wins or learning from failures\nuser: "Our app just hit #1 on the App Store!"\nassistant: "Incredible achievement! Let
      me bring in the studio-coach to celebrate with the team and capture what made this success possible."\n<commentary>\nThe
      coach helps institutionalize wins and extract learnings from both successes and failures.\n</commentary>\n</example>'
