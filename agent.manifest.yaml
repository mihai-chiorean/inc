      setups routes to `video-analytics-engineer`; edge YOLO/TensorRT deployment on Jetson routes to `vision-engineer`; CUDA-kernel-level
      work routes to `gpu-engineer`; production backend plumbing (auth, gRPC, database) routes to `backend-architect` or `swift-backend`/`go-engineer`.'
