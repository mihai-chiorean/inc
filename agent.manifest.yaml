  infra-reviewer:
    file: engineering/infra-reviewer.md
    category: engineering
    description: 'Use this agent when reviewing Terraform plans, validating GCP configurations, auditing CI/CD pipelines for
      infrastructure conflicts, or catching cloud-specific gotchas before apply. This agent specializes in GCP (Cloud Run,
      Certificate Manager, Network Security, CAS), Terraform state conflicts, and deployment pipeline consistency. Examples:\n\n<example>\nContext:
      Reviewing Terraform before apply\nuser: "Review the ALB mTLS Terraform module before we apply it"\nassistant: "Terraform
      for GCP mTLS has several gotchas. Let me use the infra-reviewer agent to validate locations, IAM, and resource dependencies."\n<commentary>\nGCP
      resources have location constraints (TrustConfig must be global) that are easy to get wrong.\n</commentary>\n</example>\n\n<example>\nContext:
      Deployment pipeline conflicts\nuser: "Our gcloud deploy and Terraform keep overwriting each other"\nassistant: "Dual
      management of Cloud Run is a common issue. I''ll use the infra-reviewer agent to identify conflicts and recommend a
      single source of truth."\n<commentary>\nWhen both CI/CD scripts and Terraform manage the same resources, state drift
      causes outages.\n</commentary>\n</example>\n\n<example>\nContext: IAM and permissions audit\nuser: "The Terraform apply
      fails with permission denied"\nassistant: "IAM issues need systematic debugging. Let me use the infra-reviewer agent
      to check service account roles and API enablement."\n<commentary>\nGCP IAM requires specific roles per resource type
      and APIs must be enabled before use.\n</commentary>\n</example>'
