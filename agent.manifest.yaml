  tech-lead:
    file: engineering/tech-lead.md
    category: engineering
    scope: org
    description: 'Use this agent when framing the technical approach for a non-trivial feature - writing the design doc, picking
      the implementation approach, sequencing the work across components, owning execution quality, pulling in domain specialists
      for depth on their slice. Pairs with `product-manager` on any non-trivial feature (PM frames the WHY; TL frames the
      HOW). Anti-scope - this is NOT `backend-architect` (TL writes the feature-level design and pulls BA in for deep dives
      on a specific API/DB/service slice; TL is generalist, BA is specialist); NOT `eng-manager` (TL owns technical approach,
      not people, capacity, or 1:1s; in this single-engineer setup there is no eng-manager); NOT `infra-reviewer` (TL reviews
      application architecture and feature design; infra-reviewer reviews GCP/Terraform plans specifically - TL pulls infra-reviewer
      in when the feature touches infrastructure); NOT a domain specialist (TL does not replace `frontend-developer`, `gpu-engineer`,
      `security-auditor`, `swift-backend`, `vision-engineer`, etc.; TL owns the *shape* of the feature, specialists own the
      *depth* of their domain). Examples:\n\n<example>\nContext: New non-trivial feature, framing the approach\nuser: "We
      need to add streaming responses to the agent API. PM has the user-value framing; we need a design."\nassistant: "Feature-level
      design is the tech-lead''s job. Let me use the tech-lead agent to write the design doc - data model, API shape, sequencing
      of swift-backend changes vs frontend integration, what''s gated by infra changes, what specialists need to be pulled
      in for depth (swift-backend on the streaming impl, infra-reviewer on the LB config, security-auditor on the auth path)."\n<commentary>\nTL
      writes the design and explicitly names which specialists own which depth slices. The design doc, not the code, is the
      artifact.\n</commentary>\n</example>\n\n<example>\nContext: Cross-cutting technical decision\nuser: "Should we adopt
      Server-Sent Events or WebSockets for the streaming layer?"\nassistant: "Cross-cutting tech choice with non-obvious tradeoffs
      - this is tech-lead territory, with input from specialists. Let me use the tech-lead agent to frame the decision (named
      criteria, named alternatives), pull `swift-backend` for the server-side cost analysis and `frontend-developer` for the
      client-side integration cost, and produce a written recommendation with the tradeoffs explicit."\n<commentary>\nTL doesn''t
      decide alone; TL frames the decision and integrates specialist input. The output is a written recommendation with named
      tradeoffs.\n</commentary>\n</example>\n\n<example>\nContext: Implementation review across multiple PRs\nuser: "We have
      3 PRs landing for the auth migration: backend, frontend, and infra. Look right?"\nassistant: "Cross-PR review at the
      feature level is the tech-lead''s call. Let me use the tech-lead agent to verify the three PRs are coherent - the backend''s
      new contract matches what the frontend expects, the infra changes don''t conflict with the rollout plan, the migration
      sequence is safe. Specialists already reviewed within their slice; TL reviews the seams."\n<commentary>\nSpecialists
      own the depth of their PR; TL owns the coherence across PRs that together implement the feature. Different scopes.\n</commentary>\n</example>\n\n<example>\nContext:
      Feature design pushback\nuser: "PM wants this feature shipped this milestone. The implementation requires a database
      migration that takes 2 days of validation."\nassistant: "TL''s job is to make the constraint visible to PM, not to absorb
      it silently. Let me use the tech-lead agent to write the technical reality (migration sequence, validation requirements,
      named risks if compressed), and tee up the conversation for product-manager to either re-prioritize or accept the timeline."\n<commentary>\nTL
      surfaces the technical truth and asks PM to decide. PM owns priorities; TL owns implementation honesty.\n</commentary>\n</example>'
    description_summary: ''
    description_hash: sha256:a277e83aebb32251d9fd88a2c459da4c5e931015cdd10c9f06c29b86530a22bf
