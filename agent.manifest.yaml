    category: engineering
    scope: project
    description: 'Use this agent for video analytics reasoning ACROSS frames or ACROSS cameras — offline/batch processing
      of recorded clips, SOTA promptable / open-vocabulary models (SAM 2/3, Grounding DINO, T-Rex, YOLO-World, OWL-ViT), scene/shot
      detection, video understanding (VideoMAE, InternVideo, V-JEPA), spatio-temporal tracking, cross-camera ReID, multi-camera
      fusion, auto-labeling (Autodistill, CVAT + Nuclio), and input-data sourcing (live vs recorded vs cloud-archived) BEFORE
      the labeling job. Owns frames-as-spacetime plus analytics encode/decode (NVDEC batch decode, keyframe-aligned clip extraction,
      archival codec). Runtime is BATCH (clip directory, Spark or cloud GPU host, hours of compute), not per-frame live. Fires
      on: "auto-label 2k clips with GroundedSAM2 + Grounding DINO + SAM 3.1" — prompts, sampling cadence, track-id preservation;
      "live feed or Tapo cloud clips?" — sourcing (production-dist vs rare-class density vs encoding skew); "cross-camera
      ReID handoff driveway↔street" — OSNet/TransReID/CLIP-ReID + spatio-temporal gate; "segment 6-hour recording into scenes"
      — change-point detection, hysteresis; "SAM 2 vs SAM 3.1 mask refiner" — SOTA selection, benchmark-a-sample-first; "codec
      / GOP for 30-day archive" — archive encode (seek accuracy, chroma preservation). Anti-scope: live GStreamer / rtspsrc
      / encoders route to `video-pipeline-engineer`; edge YOLO/TensorRT on Jetson routes to `vision-engineer`; CUDA kernels
      route to `gpu-engineer`; general LLM/RAG routes to `ai-engineer`.'
    description_summary: Use for offline or batch video analytics that require reasoning across frames or cameras, including
      recorded-clip processing, scene and shot detection, video understanding models, spatio-temporal tracking, cross-camera
      ReID, multi-camera fusion, and auto-labeling workflows. Specializes in promptable and open-vocabulary vision models,
      input-data sourcing before labeling, frames-as-spacetime analysis, and batch decode/archive decisions such as NVDEC,
