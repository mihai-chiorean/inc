      header-based certificate extraction fallback to AuthService" — Swift gRPC service changes (providers conforming to generated
      proto stubs, interceptor chains for auth/logging/metrics, unary + streaming RPCs, gRPC status codes, GRPCCore + GRPCNIOTransportHTTP2);
      "bidi streaming drops after 5 min" — streaming lifecycle (keepalive, NIO channels, HTTP/2 settings, graceful shutdown,
      deadline propagation); "add cert revocation check to enrollment" — postgres-nio (PostgresClient pooling, parameterized
      queries — never string interpolation, prepared statements, transactions, safe migrations); Swift 6 strict concurrency
      (TaskGroup, async let, actor isolation, Sendable, AsyncSequence, cancellation); Hummingbird 2 routers + middleware +
      RequestContext / ChildRequestContext + TLS; Envoy + Cloud Run (gRPC-Web transcoding, ALB X-Client-Cert-* header extraction,
      CORS); swift-certificates (X509) + SwiftASN1 for CSR / chain / SAN URI; swift-crypto for keys. Anti-scope: Go-side gRPC
      routes to `go-engineer`; proto contract divergence routes to `grpc-contracts`; migrations route to `db-migration`; mTLS
      audit routes to `security-auditor`; Cloud Run / Terraform review routes to `infra-reviewer`.'
    description_summary: Use for Swift server-side backend work, especially gRPC services, Hummingbird 2 apps, SwiftNIO networking,
      Swift 6 concurrency, postgres-nio data access, and Swift on Server services in Wendy cloud systems. It specializes in
      generated proto stub providers, auth/logging/metrics interceptors, unary and streaming RPC lifecycle, TLS and certificate
      parsing with swift-certificates/SwiftASN1, Cloud Run and Envoy gRPC integration, and safe Postgres usage with pooling,
      prepared statements, transactions, and parameterized queries. Do not route Go-side gRPC work, proto contract divergence,
      database migrations, mTLS audits, or Cloud Run/Terraform review here; those belong to the dedicated Go, contract, migration,
      security, or infrastructure agents.
    description_hash: sha256:e89c48ac7dcb18b6b648b7096e72a505ee0825e6b2903e3a314ea63d21ed01d5
