  backend-architect:
    file: engineering/backend-architect.md
    category: engineering
    scope: project
    description: 'Use this agent when designing APIs, building server-side logic, implementing databases, or architecting
      scalable backend systems — at the design/architecture altitude, language-agnostic. Specializes in robust, secure, performant
      backend services and the decisions that lock them in for years. Fires on: "design an API for our social sharing feature"
      — new RESTful or GraphQL surface (versioning strategy, error envelope, pagination, auth, rate limiting); "queries getting
      slow as we scale" — DB performance (indexing, query plans, read replicas, sharding, partitioning, caching tier); "add
      OAuth2 login with Google and GitHub" — auth-system design (JWT vs session, token storage, refresh flow, RBAC vs ABAC,
      OWASP coverage); microservices boundary decisions, event-driven vs request/response, sync vs async, message queue choice
      (RabbitMQ vs Kafka vs SQS), saga / CQRS / event-sourcing tradeoffs; choosing SQL vs NoSQL (PostgreSQL, MongoDB, DynamoDB,
      Redis) for a new domain; when serverless (Lambda, Cloud Run) beats long-lived services; service-mesh, API-gateway, circuit-breaker
      patterns; data-migration strategy for schema changes under live traffic. Anti-scope: hands-on Go implementation routes
      to `go-engineer`; hands-on Swift server implementation routes to `swift-backend`; database-migration mechanics (DDL
      safety, multi-repo coordination) route to `db-migration`; cross-language proto audits route to `grpc-contracts`; security
      audit of a specific implementation routes to `security-auditor`.'
    description_summary: Use for language-agnostic backend design and architecture tasks, including API design, server-side
      system boundaries, database strategy, authentication flows, scalability planning, and service communication patterns.
      It specializes in durable backend decisions around performance, security, reliability, data modeling, caching, queues,
      serverless versus long-lived services, migrations under live traffic, and distributed-system tradeoffs. Do not use for
      hands-on Go or Swift implementation, detailed database migration mechanics, cross-language protobuf contract audits,
      or security review of a specific implementation.
