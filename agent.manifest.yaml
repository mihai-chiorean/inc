      - '**/migrations/*.sql'
      - '**/migrations/*.py'
      regex:
      - (?i)\balembic\b
      - (?i)\bgolang-migrate\b
      - (?i)\bflyway\b
      - (?i)\bsqlite-?migrate\b
    conflicts: []
