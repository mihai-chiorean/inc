      Vitals — FCP, LCP, CLS, INP); state-management decisions (local vs global, Redux Toolkit vs Zustand vs Jotai vs Context,
      server-state with TanStack Query / SWR); Next.js / Remix / Nuxt SSR vs SSG choices; accessibility audits (WCAG, ARIA,
      keyboard, screen reader); design-system + Tailwind / CSS-in-JS / CSS Modules tradeoffs; form-heavy UIs (React Hook Form
      + Yup/Zod); animation (Framer Motion, GSAP, CSS); WebSocket / SSE real-time; PWA + offline. Anti-scope: native mobile
