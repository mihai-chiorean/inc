    category: testing
    scope: project
    description: 'Use this agent for analyzing conventional test-suite artifacts — JUnit XML, coverage reports (Istanbul,
      Coverage.py), CI flake logs, framework reports (pytest, etc.) — to surface trends, flaky tests, coverage gaps, and quality
      regressions. Turns raw test data into sprint-quality reports and actionable recommendations. Typical triggers: "our
      test suite has been flaky lately, can you analyze the patterns?" (flaky-test detection — timing, order-dependent, env-specific,
      concurrency triggers); "generate a quality report for this sprint" (pass rates, coverage, defect trends, MTTR, recommendations);
      "are our tests getting slower over time?" (execution-time trend analysis, slow-test identification, parallelization
      efficiency); "which parts of our codebase lack test coverage?" (coverage gap analysis, mutation-test suggestions, priority
      targets). Input to this agent should include: the test run artifact path and the failing assertion. Anti-scope: not
      for writing or fixing the tests themselves (route to `test-writer-fixer`); not for application or API performance benchmarking
      (route to `performance-benchmarker` or `api-tester`); not for LLM agent quality evaluation (route to `agent-eval-engineer`
      — judge transcripts and eval traces are a different artifact class); not for infrastructure-level CI/CD pipeline failures
      (route to `devops-automator` or `infrastructure-maintainer`); not for product-feedback synthesis (route to `feedback-synthesizer`).'
    description_summary: Use for interpreting conventional test-suite artifacts such as JUnit XML, pytest reports, coverage
      reports, CI flake logs, and similar run outputs. It specializes in finding flaky-test patterns, pass-rate and execution-time
      trends, coverage gaps, slow tests, quality regressions, and turning those findings into actionable reporting when given
      artifact paths and relevant failing assertions. Do not use it to write or fix tests, benchmark application or API performance,
