      implementation approach, sequence work across components, own execution quality, pull domain specialists in for depth
      on their slice. Fires on: ''PM has the user-value framing — we need a design''; cross-cutting technical decisions with
      non-obvious tradeoffs (SSE vs WebSockets, sync vs async, REST vs gRPC); cross-PR coherence review where the seams between
      specialist PRs need to hold (backend''s contract matches frontend''s expectation, migration safe, rollout plan executes
      against the deployed shape); surfacing technical reality to PM when timeline or scope conflicts with implementation
      honesty (rather than absorbing the constraint silently). Pairs with `product-manager` through code-complete (PM frames
      the WHY; TL frames the HOW). Anti-scope: deep specialist work goes to `backend-architect`, `swift-backend`, `frontend-developer`,
      `infra-reviewer`, `security-auditor`, `gpu-engineer`, `embedded-linux`, `vision-engineer`, `video-pipeline-engineer`,
      etc. — TL owns the *shape* of the feature, specialists own the *depth* of their slice. Schedule and dependency tracking
      belongs to `tpm` (TL does not track dates). Rollout belongs to `release-engineer` (TL hands off at code-complete). TL
      is generalist; pulls specialists in for depth and trusts them within their slice.'
    description_summary: Use for non-trivial feature work that needs a technical design, implementation approach, cross-component
