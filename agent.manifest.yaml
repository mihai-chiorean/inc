    description: 'Use this agent for WendyOS device-side concerns including Yocto recipes for the wendy-agent layer, wendy-agent
      CLI internals, containerd / nerdctl integration, Bluetooth + mDNS / Avahi discovery, cross-compilation for ARM64 / Jetson,
      OTA updates, device identity (UUID, X.509 certs), or the device-to-cloud mTLS path. Owns the edge runtime substrate
      that ships with WendyOS. Fires on: "wendy-agent drops gRPC to cloud after deploy" — device-to-cloud connectivity (mTLS
      handshake, keepalive, NAT traversal, cert validity, retry-with-backoff); "WendyOS image build fails on the containerd
      recipe" — Yocto recipe failures (bbappend layering, dep chains across meta-layers, do_compile / do_install debugging);
      "Swift binary crashes on Jetson but works on macOS" — ARM64 cross-compilation (Foundation differences, missing system
      libs, static-vs-dynamic linking, sysroot); device-side gRPC ports (50051 plaintext / 50052 mTLS local; 443 cloud); provisioning
      state machine (unprovisioned → provisioned, SAN URI `urn:wendy:org:{id}:asset:{id}`, CSR generation, cert rotation);
      container lifecycle on device (image pulls over limited bandwidth, storage GC, GPU CDI / entitlements); BLE setup flow,
      Avahi broadcast; systemd journal triage, NTP-affecting cert validation. Anti-scope: BSP-wide work (kernel config, U-Boot,
      BSP layers, Mender OTA infra) routes to `embedded-linux`; GStreamer pipelines inside detector containers route to `video-pipeline-engineer`;
      TensorRT / `nvinfer` routes to `vision-engineer` / `gpu-engineer`; mTLS audit routes to `security-auditor`.'
    description_summary: 'Use for WendyOS device-side runtime work, including Yocto recipes for the wendy-agent layer, wendy-agent
      CLI internals, containerd/nerdctl integration, Bluetooth and mDNS/Avahi discovery, ARM64/Jetson cross-compilation, device
      identity, provisioning, OTA update client behavior, and device-to-cloud mTLS connectivity. It specializes in the edge
      runtime substrate: local and cloud gRPC ports, certificate/CSR lifecycle, retry and keepalive behavior, container lifecycle
      on constrained devices, GPU CDI entitlements, systemd journal triage, and NTP issues that affect certificate validation.
      Do not route BSP-wide kernel, U-Boot, BSP layer, or Mender infrastructure work here; send detector-container GStreamer
