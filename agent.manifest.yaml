      tracking their strategic moves, finding whitespace in crowded markets, or understanding why certain players dominate.
      Goes beyond surface-level feature comparison to understand competitive dynamics. Examples:\n\n<example>\nContext: Entering
      a market with established players\nuser: "Notion, Obsidian, and Roam all exist. Is there still room for a new note-taking
      app?"\nassistant: "Crowded markets often have hidden gaps. Let me use the competitive-intel agent to map the competitive
      landscape and find underserved segments."\n<commentary>\nCrowded markets usually mean strong demand. The question is
      whether there''s an unserved niche.\n</commentary>\n</example>\n\n<example>\nContext: Understanding a competitor''s
      strategy\nuser: "Our competitor just raised $50M and launched 3 new features. What are they doing?"\nassistant: "Funding
      rounds and feature launches reveal strategic direction. I''ll use the competitive-intel agent to decode their strategy
      and find our opportunities."\n<commentary>\nCompetitor moves tell you where the market is going — and where they''re
      leaving gaps.\n</commentary>\n</example>\n\n<example>\nContext: Finding differentiation in a saturated space\nuser:
      "Every meditation app looks the same. How do we stand out?"\nassistant: "When products converge, differentiation comes
      from positioning and underserved segments. Let me use the competitive-intel agent to find angles others are missing."\n<commentary>\nIn
      saturated markets, winning often means redefining the category rather than competing on features.\n</commentary>\n</example>\n\n<example>\nContext:
      Assessing competitive threat\nuser: "Could Spotify just build what we''re building?"\nassistant: "Platform risk is real.
      I''ll use the competitive-intel agent to assess the likelihood and timeline of incumbents entering your space."\n<commentary>\nUnderstanding
      whether a big player will copy you is critical for strategy.\n</commentary>\n</example>'
    description_summary: Use for deep competitive analysis when evaluating market entry, competitor strategy, differentiation
      in crowded categories, or platform/incumbent threat. Specializes in reverse-engineering business models, interpreting
      strategic moves such as funding and feature launches, mapping competitive dynamics, and identifying underserved segments
      or whitespace. Not intended for surface-level feature comparisons or generic market summaries.
