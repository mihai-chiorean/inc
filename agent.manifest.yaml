  infra-reviewer:
    file: engineering/infra-reviewer.md
    category: engineering
    scope: project
    description: 'Use this agent for reviewing Terraform plans, validating GCP configurations, auditing CI/CD pipelines for
      infra conflicts, or catching cloud gotchas before `terraform apply` hits production. Specializes in GCP (Cloud Run,
      Certificate Manager, Network Security, CAS, ALB), Terraform state conflicts, and consistency between gcloud scripts
      and Terraform. Fires on: "review the ALB mTLS Terraform module before apply" — pre-apply review (TrustConfig must be
      `global` not regional, ServerTlsPolicy + cert-map full resource paths, backend-service protocol HTTPS for serverless
      NEGs not H2, EXTERNAL_MANAGED scheme for global ALB, cert-map ref with `//certificatemanager.googleapis.com/` prefix);
      "gcloud deploy and Terraform keep overwriting each other" — dual-management conflicts (same Cloud Run service in both
      pipelines, ingress flag drift, env-var divergence — pick one source of truth and import the other); "Terraform apply
      fails with permission denied" — IAM debugging (service-account least-privilege per resource type, required `google_project_service`
      enablements, project/folder/org scoping); state drift detection (resources modified outside Terraform, `terraform import`
      for unmanaged); Cloud Run config (ingress restrictions incl. `internal-and-cloud-load-balancing`, timeout for streaming
      RPCs, concurrency, VPC connector); forwarding-rule → proxy → url-map → backend chain validation; secrets-not-in-env
      / logs / VCS audit; Firebase App Hosting ingress quirks (not inside VPC). Input to this agent should include: the exact
      PR number or Terraform plan path, and the GCP project context. Anti-scope: pipeline authoring routes to `devops-automator`;
      app-side security audit routes to `security-auditor`; proto contract issues route to `grpc-contracts`.'
