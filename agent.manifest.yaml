  vision-engineer:
    file: engineering/vision-engineer.md
    category: engineering
    scope: project
    description: 'Use this agent for computer-vision MODELS and frame-as-tensor problems — detection models (YOLOv5/YOLOv8/YOLO11,
      SSD, DETR), TensorRT engine building/optimization, frame preprocessing (letterbox, normalization, color conversion),
      NMS and coordinate remapping, per-camera tracking (SORT, DeepSORT, NvDCF, ByteTrack), accuracy debugging of edge vision
      models on Jetson. Owns the model + frame-as-data pipeline (preprocess → inference → postprocess → per-camera track).
      Fires on: "YOLO producing wrong bounding boxes after preprocessing" — letterbox + aspect ratio + center padding + model-space
      ↔ image-space transform; "YOLO11n at 12 FPS on Orin, need 30" — model-side latency breakdown (preprocess, GPU transfer,
      inference, postprocess) before blaming transport; "track people across frames with stable IDs" — SORT/DeepSORT/NvDCF/ByteTrack
      selection, Kalman + association + lifecycle tuning; "mAP dropped 0.42 → 0.31 swapping YOLO11n for YOLOv8n" — preprocessing
      mismatch or output-tensor decoding (transposed vs non-transposed); ONNX export (opset, dynamic axes); FP16/INT8 quantization;
      tensorrt-swift bindings (`Engine`, `ExecutionContext`); `nvinfer` *inference* keys (model-engine-file, num-detected-classes,
      output-blob-names). Anti-scope: GStreamer plumbing, rtspsrc, encoder/muxer chains, `nvinfer` *pipeline* keys route to
      `video-pipeline-engineer`; cross-camera ReID / multi-camera fusion / batch open-vocab labeling route to `video-analytics-engineer`;
      TensorRT internals / CUTLASS / kernels route to `gpu-engineer`.'
    description_summary: Use for computer-vision model and frame-as-tensor work, especially detection models, preprocessing,
      inference output decoding, NMS, coordinate remapping, TensorRT engine building, quantization, and per-camera tracking.
      It specializes in debugging accuracy and latency across the preprocess -> inference -> postprocess -> tracking path
      for edge vision deployments such as Jetson, including YOLO/SSD/DETR variants and TensorRT Swift bindings. Do not use
      for GStreamer/RTSP/encoder pipeline plumbing, cross-camera ReID or multi-camera analytics, or low-level TensorRT kernel/CUTLASS
      internals.
    description_hash: sha256:b4cf4b88fcfd6ae15fee309eb36e869953a5d90c8b4bb46d59b21f2c2bb0880f
