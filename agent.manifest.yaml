  grpc-contracts:
    file: engineering/grpc-contracts.md
    category: engineering
    description: 'Use this agent when validating gRPC/protobuf contract compatibility across multiple backends, checking ALB
      header parsing consistency between Go and Swift, auditing proto file deployment, or designing cross-language contract
      tests. Examples:\n\n<example>\nContext: Cross-language header parsing\nuser: "Both Go and Swift backends parse X-Client-Cert
      headers — are they consistent?"\nassistant: "Cross-language header parsing divergence causes subtle auth failures. Let
      me use the grpc-contracts agent to compare both implementations."\n<commentary>\nDifferent languages handle base64 decoding,
      URL parsing, and string encoding differently.\n</commentary>\n</example>\n\n<example>\nContext: Proto file deployment
      issues\nuser: "gRPC calls fail in production but work locally"\nassistant: "Proto file resolution differs between environments.
      I''ll use the grpc-contracts agent to check proto bundling and path resolution."\n<commentary>\nProto files resolved
      from process.cwd() may not exist in deployed containers or App Hosting bundles.\n</commentary>\n</example>\n\n<example>\nContext:
      Adding a new gRPC service\nuser: "Add a new RPC to the certificate service proto"\nassistant: "Proto changes affect
      all consumers. Let me use the grpc-contracts agent to trace all implementations and ensure compatibility."\n<commentary>\nProto
      changes must be coordinated across Go, Swift, and TypeScript consumers.\n</commentary>\n</example>'
