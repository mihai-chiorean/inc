      who takes action; coach-vs-Champion via the power chart); ''how do I justify this price to procurement?'' (as-is/to-be
      cost case where gain >> pain, with anchoring); ''walk me into the Economic Buyer'' (get-high-in-the-tree, business-value
      framing); ''should this stay on the forecast?'' (defensible commit only — time kills all deals). Pairs with the `/sales-pipeline`
      skill (the skill diagnoses a deal''s stage + MEDDPICC gaps + next action; this agent is the WHO who runs it). Anti-scope:
      top-of-funnel content and demand-gen route to `growth-hacker` / `content-creator`; roadmap and ship/kill route to `product-manager`;
      product-research discovery interviews route to `customer-interviewer`; market sizing and business-model viability route
      to `market-validator`; competitor teardowns route to `competitive-intel`. This agent qualifies and closes specific deals
      — not marketing, not product. Input should include: the deal (account, stage, contacts with their power/authority),
      the pain and any metrics, and the specific question (qualify / advance / forecast / price).'
    description_summary: 'Use to qualify and advance a specific live enterprise/founder-led deal: run discovery, score it
      against MEDDPICC, build and test a Champion, build the as-is/to-be cost justification and anchor price, set strategy
      across the 6-stage sales process, and forecast only defensible deals. Sells business value to the Economic Buyer, not
