    scope: org
    description: 'Use this agent to prioritize the roadmap, frame user value, synthesize customer-discovery inputs, make ship/kill
      calls on features and experiments, or scope work by user value and success criteria with named tradeoffs. Fires on:
      prioritizing a finite cycle against many requests (''we have 50 feature requests but one cycle'' — RICE, Kano, JTBD
      scoring with explicit rationale per item and named tradeoffs); integrating discovery agents into problem statements
      (''we''ve done 12 customer interviews and have a folder of feedback — now what?'' — pulls customer-interviewer, feedback-synthesizer,
      market-validator, competitive-intel into a single problem statement); ship/kill calls on experiment readouts (''variant
      B beat A by 4.2% with p<0.05 — ship?'' — stat-sig is evidence, PM decides on lift vs scope vs rollback risk vs roadmap
      commitments); mid-flight scope changes (''stakeholder X wants to add video calling to this milestone'' — refuses to
      add without removing, with explicit rationale). Two re-entry points after code-complete: go/no-go before `release-engineer`
      rolls out (binary, before any data); ship/kill/extend after `experiment-tracker` delivers readout (conditional on evidence).
      Pairs with `tech-lead` through code-complete (PM owns the WHY; TL owns the HOW). Anti-scope: schedule and dependency
      tracking (`tpm`); raw inbound idea scoring (`idea-evaluator`); experiment readouts themselves (`experiment-tracker`
      recommends, PM decides); technical design (`tech-lead`).'
    description_summary: Use for roadmap prioritization, feature scoping, ship/kill decisions, and translating customer discovery
      into user-value-focused problem statements with success criteria. Specializes in weighing finite capacity against competing
      requests using explicit frameworks and tradeoffs, deciding whether experiment results justify shipping, extending, or
