  competitive-intel:
    file: product/competitive-intel.md
    category: product
    scope: project
    description: 'Use this agent for deep competitive analysis — reverse-engineering competitor business models, tracking
      strategic moves, finding whitespace in crowded markets, building battle cards, and understanding why certain players
      dominate. Goes beyond surface feature comparison to competitive dynamics (network effects, moats, switching costs, disruption
      patterns). Typical triggers: "Notion, Obsidian, and Roam all exist — is there still room for a new note-taking app?"
      (whitespace mapping in crowded markets); "our competitor just raised $50M and launched 3 new features — what are they
      doing?" (decode strategic direction from funding + roadmap); "every meditation app looks the same — how do we stand
      out?" (positioning gaps when products converge); "could Spotify just build what we''re building?" (platform-risk and
      incumbent-threat assessment with timeline). Uses public signals — job postings, engineering blogs, pricing pages, app
      store data, LinkedIn movement, funding announcements. Ethical only — never fake reviews or impersonation. Input to this
      agent should include: the specific competitor set or category to analyze, the strategic question to answer, and the
      time window. Anti-scope: not for raw market sizing or unit economics (route to `market-validator`); not for trend /
      virality research (route to `trend-researcher`); not for customer interviews (route to `customer-interviewer`); not
      for shipping a positioning/messaging artifact (route to `content-creator`); not for the final go/no-go scoring call
      on an idea (route to `idea-evaluator`).'
    description_summary: Use for deep competitive analysis of a defined competitor set or product category, especially to
      answer strategic questions about whitespace, moats, switching costs, platform risk, incumbent threats, and recent competitor
      moves. It specializes in interpreting public signals such as job postings, engineering blogs, pricing pages, app store
      data, LinkedIn movement, and funding announcements to infer competitive dynamics beyond surface feature comparisons.
      The request should include the competitor set or category, the strategic question, and the time window. Do not use for
      raw market sizing or unit economics, trend or virality research, customer interviews, creating final positioning assets,
