# Frozen judge configuration for the routing eval (MIT-296).
#
# Codex (a non-Claude-family model) is the routing JUDGE: given a prompt + the
# agent roster it predicts which agent should handle the task. Its prediction
# is compared to the dataset's `expected` (deterministic id match). Using a
# different model family than the Claude-authored roster avoids correlated bias
# — see docs/judge.md.
#
# THIS FILE IS FROZEN. Changing model, judge_prompt, or output_schema breaks
# comparability with prior runs: bump `config_version` and record the change in
# the trend file (MIT-299). The runner (MIT-297) stamps the resolved model +
# snapshot + date into every run's output JSON.

config_version: v1

model:
  name: gpt-5.5                 # pinned model requested via the codex CLI
  provider: codex-cli           # OpenAI codex CLI
  provider_version: "0.124.0"   # codex-cli version at pinning time (2026-06-05)
  reasoning_effort: high
  # The exact dated snapshot (e.g. gpt-5.5-YYYY-MM-DD) is not statically exposed
  # by the codex CLI, so it cannot be hardcoded here. The runner records the
  # snapshot + date returned at call time into each run's output (MIT-297).

determinism:
  temperature: 0
  seed: 1729
  # Caveat: high-reasoning models may not honor temperature/seed exactly.
  # Runs are near-deterministic; drift is tracked separately (MIT-300).

judge_prompt:
  version: v1
  # Placeholders {prompt} and {roster} are substituted verbatim (str.replace,
  # not str.format) so the literal JSON braces below survive.
  template: |
    You are a routing judge for a roster of specialist AI agents.

    Given a user's natural-language task and the roster (each line: "<agent-id>: <one-line scope>"),
    choose the single agent that SHOULD handle the task, or "NONE" if no agent is a good fit.

    Respond with ONLY a JSON object, no prose:
    {"selected_agent": "<agent-id or NONE>", "confidence": <number 0..1>, "runner_up": "<agent-id or null>"}

    TASK:
    {prompt}

    ROSTER:
    {roster}

output_schema:
  type: object
  required: [selected_agent, confidence, runner_up]
  properties:
    selected_agent:
      type: string
      description: "agent stable-id, or the literal NONE"
    confidence:
      type: number
      minimum: 0
      maximum: 1
    runner_up:
      type: [string, "null"]
      description: "second-choice agent id, or null"
